function bindIncomeEvents(){
  var addBtn=document.getElementById("incAdd");
  if(addBtn)addBtn.addEventListener("click",async function(){
    var name=document.getElementById("incName").value.trim();
    var amount=parseFloat(document.getElementById("incAmount").value);
    if(!name||!amount){toast("Please fill in name and amount",true);return}
    addBtn.disabled=true;
    await hubAdd("income",{name:name,type:document.getElementById("incType").value,amount:amount,frequency:document.getElementById("incFreq").value,source:"manual",detectionStatus:"confirmed"});
    await hubLoad("income");
    toast("Income source added");render();
  });
  // Confirm detected income
  document.querySelectorAll("[data-confirm-income]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["income"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.confirmIncome});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="confirmed";
      await hubUpdate("income",item);
      await hubLoad("income");toast("Income source confirmed and now tracked");render();
    });
  });
  // Edit detected income
  document.querySelectorAll("[data-edit-detected-income]").forEach(function(b){
    b.addEventListener("click",function(){
      var items=(hubCache["income"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.editDetectedIncome});
      if(!item)return;
      var newName=prompt("Source name:",item.name||"");
      if(newName===null)return;
      var newAmt=prompt("Amount (£):",item.amount||"");
      if(newAmt===null)return;
      var newFreq=prompt("Frequency (monthly/weekly/bi-weekly/one-off/irregular):",item.frequency||"monthly");
      if(newFreq===null)return;
      item.name=newName.trim()||item.name;
      item.amount=parseFloat(newAmt)||item.amount;
      item.frequency=newFreq||item.frequency;
      item.detectionStatus="edited_confirmed";
      hubUpdate("income",item).then(function(){hubLoad("income").then(function(){toast("Income source edited and confirmed");render()})});
    });
  });
  // Dismiss detected income
  document.querySelectorAll("[data-dismiss-income]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["income"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.dismissIncome});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="dismissed";
      await hubUpdate("income",item);
      await hubLoad("income");toast("Dismissed");render();
    });
  });
  // Mark as not relevant
  document.querySelectorAll("[data-notrelevant-income]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["income"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.notrelevantIncome});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="not_relevant";
      await hubUpdate("income",item);
      await hubLoad("income");toast("Marked as not relevant");render();
    });
  });
  // Restore dismissed item back to detected
  document.querySelectorAll("[data-restore-income]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["income"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.restoreIncome});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="detected";
      await hubUpdate("income",item);
      await hubLoad("income");toast("Restored for review");render();
    });
  });
  // Delete income
  document.querySelectorAll("[data-del-income]").forEach(function(b){
    b.addEventListener("click",async function(){
      await hubDelete("income",b.dataset.delIncome);
      await hubLoad("income");toast("Removed");render();
    });
  });
}

// ───────── BUDGET VIEW ─────────
function budgetView(){
  var data=hubCache["budget"]||{items:[]};
  var items=data.items||[];
  var html=hubBackBtn("Monthly Budget");

  // Calculate totals
  var totalExpected=0,totalPlanned=0,totalActual=0;
  items.forEach(function(it){
    if(it.budgetType==="income")totalExpected+=parseFloat(it.planned||0);
    else{totalPlanned+=parseFloat(it.planned||0);totalActual+=parseFloat(it.actual||0)}
  });
  var diff=totalExpected-totalActual;

  // Show auto-sync info
  var uploadLines=items.filter(function(i){return i.source==="upload"});
  if(uploadLines.length>0){
    html+='<div style="background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:12px;color:var(--muted)" class="fi"><strong style="color:var(--purple)">'+uploadLines.length+' budget line'+(uploadLines.length!==1?'s':'')+' auto-populated</strong> with actual spending from your confirmed transactions</div>';
  }

  html+='<div class="summary-grid fi">';
  html+='<div class="summary-stat" style="border-color:rgba(34,197,94,.2)"><div class="ss-val" style="color:var(--green)">'+f(totalExpected)+'</div><div class="ss-label">Expected Income</div></div>';
  html+='<div class="summary-stat" style="border-color:rgba(168,85,247,.2)"><div class="ss-val" style="color:var(--purple)">'+f(totalPlanned)+'</div><div class="ss-label">Planned Spending</div></div>';
  html+='<div class="summary-stat" style="border-color:rgba(239,68,68,.2)"><div class="ss-val" style="color:var(--red)">'+f(totalActual)+'</div><div class="ss-label">Actual Spending</div></div>';
  html+='<div class="summary-stat" style="border-color:'+(diff>=0?"rgba(34,197,94,.2)":"rgba(239,68,68,.2)")+'"><div class="ss-val" style="color:'+(diff>=0?"var(--green)":"var(--red)")+'">'+(diff<0?"-":"")+f(Math.abs(diff))+'</div><div class="ss-label">Difference</div></div>';
  html+='</div>';

  // Add budget line form
  html+='<div class="ccard fi"><h3>Add Budget Line</h3>';
  html+='<div class="form-group"><label class="form-label">Category</label><input class="form-input" id="budCat" placeholder="e.g. Groceries, Rent, Salary"></div>';
  html+='<div class="form-group"><label class="form-label">Type</label><select class="form-select" id="budType"><option value="expense">Expense</option><option value="income">Income</option></select></div>';
  html+='<div class="form-group"><label class="form-label">Planned Amount (£)</label><input class="form-input" id="budPlanned" type="number" step="0.01" placeholder="0.00"></div>';
  html+='<div class="form-group"><label class="form-label">Actual Amount (£)</label><input class="form-input" id="budActual" type="number" step="0.01" placeholder="0.00"></div>';
  html+='<div class="form-group"><label class="form-label">Month</label><input class="form-input" id="budMonth" type="month"></div>';
  html+='<button class="btn-primary" id="budAdd">Add Budget Line</button></div>';

  // List budget lines
  if(items.length>0){
    // Group by month
    var months={};
    items.forEach(function(it){var m=it.month||"Unset";if(!months[m])months[m]=[];months[m].push(it)});
    Object.keys(months).sort().reverse().forEach(function(m){
      html+='<div class="sec fi"><div class="stitle">'+m+'</div>';
      months[m].forEach(function(it){
        var planned=parseFloat(it.planned||0);
        var actual=parseFloat(it.actual||0);
        var diff2=planned-actual;
        var isIncome=it.budgetType==="income";
        html+='<div class="item-card"><div class="item-top"><div><div class="item-name">'+escHtml(it.category)+'</div><div class="item-detail">'+(isIncome?"Income":"Expense")+'</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--muted)">Planned: '+f(planned)+'</div><div style="font-size:11px;color:var(--muted)">Actual: '+f(actual)+'</div><div style="font-size:13px;font-weight:700;color:'+(diff2>=0?"var(--green)":"var(--red)")+'">'+(diff2>=0?"+":"-")+f(Math.abs(diff2))+'</div></div></div>';
        if(!isIncome){
          var pct=planned>0?Math.min(100,Math.round(actual/planned*100)):0;
          html+='<div class="progress-bar"><span style="width:'+pct+'%;background:'+(pct>100?"var(--red)":pct>80?"var(--amber)":"var(--green)")+'"></span></div>';
          html+='<div style="font-size:10px;color:var(--dim)">'+pct+'% of budget used</div>';
        }
        html+='<div class="item-actions"><button class="btn-sm btn-danger" data-del-budget="'+it.id+'">Remove</button></div></div>';
      });
      html+='</div>';
    });
  }
  return html;
}

  var dismissed=items.filter(function(i){return i.detectionStatus==="dismissed"||i.detectionStatus==="not_subscription"||i.detectionStatus==="not_relevant"});

  var inactiveConfirmed=confirmed.filter(function(i){return i.status!=="active"});
  var totalActiveMonthly=activeConfirmed.reduce(function(s,i){return s+parseFloat(i.amount||0)},0);

function bindSubscriptionsEvents(){
  var addBtn=document.getElementById("subAdd");
  if(addBtn)addBtn.addEventListener("click",async function(){
    var name=document.getElementById("subName").value.trim();
    if(!name){toast("Please enter subscription name",true);return}
    addBtn.disabled=true;
    await hubAdd("subscriptions",{name:name,amount:parseFloat(document.getElementById("subAmt").value)||0,frequency:document.getElementById("subFreq").value,subCategory:document.getElementById("subCat").value,status:"active",source:"manual",detectionStatus:"confirmed",billingDate:document.getElementById("subBillDate")?document.getElementById("subBillDate").value:"",renewalDate:document.getElementById("subRenewal")?document.getElementById("subRenewal").value:"",notes:document.getElementById("subNotes")?document.getElementById("subNotes").value.trim():""});
    await hubLoad("subscriptions");toast("Subscription added");render();
  });
  // Confirm detected subscription
  document.querySelectorAll("[data-confirm-sub]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["subscriptions"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.confirmSub});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="confirmed";
      item.status="active";
      await hubUpdate("subscriptions",item);
      await hubLoad("subscriptions");toast("Subscription confirmed and now tracked");render();
    });
  });
  // Edit detected subscription
  document.querySelectorAll("[data-edit-detected-sub]").forEach(function(b){
    b.addEventListener("click",function(){
      var items=(hubCache["subscriptions"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.editDetectedSub});
      if(!item)return;
      var newName=prompt("Subscription name:",item.name||"");
      if(newName===null)return;
      var newAmt=prompt("Amount (£):",item.amount||"");
      if(newAmt===null)return;
      var newFreq=prompt("Frequency (Monthly/Yearly/Weekly/Quarterly):",item.frequency||"Monthly");
      if(newFreq===null)return;
      item.name=newName.trim()||item.name;
      item.amount=parseFloat(newAmt)||item.amount;
      item.frequency=newFreq||item.frequency;
      item.detectionStatus="edited_confirmed";
      item.status="active";
      hubUpdate("subscriptions",item).then(function(){hubLoad("subscriptions").then(function(){toast("Subscription edited and confirmed");render()})});
    });
  });
  // Dismiss detected subscription
  document.querySelectorAll("[data-dismiss-sub]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["subscriptions"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.dismissSub});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="dismissed";
      item.status="cancelled";
      await hubUpdate("subscriptions",item);
      await hubLoad("subscriptions");toast("Dismissed");render();
    });
  });
  // Mark as not a subscription
  document.querySelectorAll("[data-notsub]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["subscriptions"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.notsub});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="not_relevant";
      item.status="cancelled";
      await hubUpdate("subscriptions",item);
      await hubLoad("subscriptions");toast("Marked as not relevant");render();
    });
  });
  // Restore dismissed item back to detected
  document.querySelectorAll("[data-restore-sub]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["subscriptions"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.restoreSub});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="detected";
      item.status="active";
      await hubUpdate("subscriptions",item);
      await hubLoad("subscriptions");toast("Restored for review");render();
    });
  });
  // Delete subscription
  document.querySelectorAll("[data-del-sub]").forEach(function(b){
    b.addEventListener("click",async function(){
      await hubDelete("subscriptions",b.dataset.delSub);await hubLoad("subscriptions");toast("Removed");render();
    });
  });
  // Toggle active/paused for confirmed subscriptions
  document.querySelectorAll("[data-toggle-sub]").forEach(function(b){
    b.addEventListener("click",function(){
      var items=(hubCache["subscriptions"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.toggleSub});
      if(!item)return;
      item.status=item.status==="active"?"paused":"active";
      hubUpdate("subscriptions",item).then(function(){hubLoad("subscriptions").then(function(){toast("Status: "+item.status);render()})});
    });
  });
}

      html+='<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--dim)">';
      html+='<span>'+f(remaining)+' remaining</span>';
      if(it.deadline)html+='<span>Deadline: '+it.deadline+'</span>';
      html+='</div>';
      if(monthlyNeeded>0)html+='<div style="font-size:12px;color:var(--amber);margin-top:6px;font-weight:600">Need '+f(monthlyNeeded)+'/month to reach goal</div>';
      html+='<div class="item-actions"><button class="btn-sm btn-edit" data-edit-sg="'+it.id+'">Update Amount</button><button class="btn-sm btn-danger" data-del-sg="'+it.id+'">Remove</button></div></div>';
    });
    html+='</div>';
  }
  return html;
}

function billsView(){
  var data=hubCache["bills"]||{items:[]};
  var items=data.items||[];
  var html=hubBackBtn("Bills & Due Dates");

  // Separate items by detection state
  var detected=items.filter(function(i){return i.detectionStatus==="detected"||i.detectionStatus==="awaiting_review"});
  var confirmed=items.filter(function(i){return !i.detectionStatus||i.detectionStatus==="confirmed"||i.detectionStatus==="edited_confirmed"});
  var dismissed=items.filter(function(i){return i.detectionStatus==="dismissed"||i.detectionStatus==="not_bill"||i.detectionStatus==="not_relevant"});

  var today=new Date().getDate();
  var confirmedTotal=confirmed.reduce(function(s,i){return s+parseFloat(i.amount||0)},0);
  var overdue=confirmed.filter(function(i){return getBillStatus(i)==="overdue"}).length;
  var upcoming=confirmed.filter(function(i){
    var due=parseInt(i.dueDate)||0;
    return due>=today&&due<=today+7&&getBillStatus(i)!=="paid";
  });
  var detectedTotal=detected.reduce(function(s,i){return s+parseFloat(i.amount||0)},0);

  // ─── Detected layer summary cards ───
  if(detected.length>0){
    html+='<div style="margin-bottom:6px;font-size:12px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:.5px">Detected from statements</div>';
    html+='<div class="summary-grid fi">';
    html+='<div class="summary-stat" style="border-color:rgba(168,85,247,.25)"><div class="ss-val" style="color:var(--purple)">'+f(detectedTotal)+'</div><div class="ss-label">Potential Bills Detected</div></div>';
    html+='<div class="summary-stat" style="border-color:rgba(245,158,11,.25)"><div class="ss-val" style="color:var(--amber)">'+detected.length+'</div><div class="ss-label">Bills Awaiting Review</div></div>';
    html+='</div>';
  }

  // ─── Confirmed layer summary cards ───
  html+='<div style="margin-bottom:6px;font-size:12px;font-weight:600;color:var(--cyan);text-transform:uppercase;letter-spacing:.5px">Confirmed &amp; tracked</div>';
  html+='<div class="summary-grid fi">';
  html+='<div class="summary-stat" style="border-color:rgba(6,182,212,.2)"><div class="ss-val" style="color:var(--cyan)">'+f(confirmedTotal)+'</div><div class="ss-label">Confirmed Monthly Bills</div></div>';
  html+='<div class="summary-stat" style="border-color:rgba(34,197,94,.2)"><div class="ss-val" style="color:var(--green)">'+upcoming.length+'</div><div class="ss-label">Upcoming Due</div></div>';
  html+='<div class="summary-stat" style="border-color:'+(overdue>0?"rgba(239,68,68,.2)":"rgba(34,197,94,.2)")+'"><div class="ss-val" style="color:'+(overdue>0?"var(--red)":"var(--green)")+'">'+(overdue>0?overdue+" overdue":"All good")+'</div><div class="ss-label">Status</div></div>';
  html+='</div>';

  // ─── Section A: Detected bills from statements ───
  if(detected.length>0){
    html+='<div class="sec fi"><div class="stitle" style="color:var(--purple)">Detected bills from uploaded statements</div>';
    html+='<div style="font-size:12px;color:var(--muted);margin-bottom:10px">These recurring bill-like payments were found in your statements. Review and confirm to start tracking due dates and totals.</div>';
    detected.forEach(function(it){
      var conf=it.confidence||"Medium";
      var confColor=conf==="High"?"var(--green)":conf==="Medium"?"var(--amber)":"var(--dim)";
      var nextDate=estimateNextDate(it.lastPaidDate||"",it.frequency);
      html+='<div class="item-card" style="border-left:3px solid var(--purple)">';
      html+='<div class="item-top"><div><div class="item-name">'+escHtml(it.name)+'</div>';
      html+='<div class="item-detail">'+escHtml(it.method||"Auto-detected from statement");
      if(it.lastPaidDate)html+=' &middot; Last paid: '+escHtml(it.lastPaidDate);
      if(nextDate)html+=' &middot; Next expected: '+escHtml(nextDate);
      if(it.occurrences)html+=' &middot; Seen '+it.occurrences+'x';
      html+='</div>';
      html+='<div style="margin-top:4px"><span style="display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(168,85,247,.12);color:var(--purple);font-weight:600">Detected</span>';
      html+=' <span style="display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(168,85,247,.06);color:'+confColor+';font-weight:600">'+conf+' confidence</span></div>';
      html+='</div>';
      html+='<div style="text-align:right"><div style="font-size:16px;font-weight:700;color:var(--purple)">'+f(it.amount)+'</div></div></div>';
      html+='<div class="item-actions" style="flex-wrap:wrap;gap:6px">';
      html+='<button class="btn-sm btn-edit" data-confirm-bill="'+it.id+'" style="background:var(--green);color:#fff">Confirm</button>';
      html+='<button class="btn-sm btn-edit" data-edit-detected-bill="'+it.id+'">Edit</button>';
      html+='<button class="btn-sm" data-dismiss-bill="'+it.id+'" style="color:var(--muted)">Dismiss</button>';
      html+='<button class="btn-sm" data-notbill="'+it.id+'" style="color:var(--dim);font-size:10px">Not relevant</button>';
      html+='</div></div>';
    });
    html+='</div>';
  }

  // ─── Section B: Confirmed / tracked bills ───
  // Show overdue first
  var overdueItems=confirmed.filter(function(i){return getBillStatus(i)==="overdue"});
  var upcomingItems=confirmed.filter(function(i){return getBillStatus(i)==="pending"});
  var paidItems=confirmed.filter(function(i){return getBillStatus(i)==="paid"});

  if(overdueItems.length>0){
    html+='<div class="sec fi"><div class="stitle" style="color:var(--red)">Overdue Bills</div>';
    overdueItems.sort(function(a,b){return(parseInt(a.dueDate)||0)-(parseInt(b.dueDate)||0)}).forEach(function(it){
      html+=renderBillCard(it);
    });
    html+='</div>';
  }

  if(upcomingItems.length>0){
    html+='<div class="sec fi"><div class="stitle">Upcoming Confirmed Bills</div>';
    upcomingItems.sort(function(a,b){return(parseInt(a.dueDate)||0)-(parseInt(b.dueDate)||0)}).forEach(function(it){
      html+=renderBillCard(it);
    });
    html+='</div>';
  }

  if(paidItems.length>0){
    html+='<div class="sec fi"><div class="stitle" style="color:var(--green)">Paid This Month</div>';
    paidItems.sort(function(a,b){return(parseInt(a.dueDate)||0)-(parseInt(b.dueDate)||0)}).forEach(function(it){
      html+=renderBillCard(it);
    });
    html+='</div>';
  }

  // ─── Section C: Add manually ───
  html+='<div class="ccard fi"><h3>Add bill manually</h3>';
  html+='<div class="form-group"><label class="form-label">Bill Name</label><input class="form-input" id="billName" placeholder="e.g. Rent, Electricity, Council Tax"></div>';
  html+='<div class="form-group"><label class="form-label">Amount (£)</label><input class="form-input" id="billAmt" type="number" step="0.01" placeholder="0.00"></div>';
  html+='<div class="form-group"><label class="form-label">Due Date (day of month)</label><input class="form-input" id="billDue" type="number" min="1" max="31" placeholder="1-31"></div>';
  html+='<div class="form-group"><label class="form-label">Frequency</label><select class="form-select" id="billFreq"><option value="Monthly">Monthly</option><option value="Quarterly">Quarterly</option><option value="Yearly">Yearly</option><option value="Weekly">Weekly</option></select></div>';
  html+='<div class="form-group"><label class="form-label">Payment Method</label><select class="form-select" id="billMethod"><option value="Auto-pay (Direct Debit)">Auto-pay (Direct Debit)</option><option value="Manual">Manual</option><option value="Standing Order">Standing Order</option></select></div>';
  html+='<div class="form-group"><label class="form-label">Notes (optional)</label><input class="form-input" id="billNotes" placeholder="Any notes about this bill"></div>';
  html+='<button class="btn-primary" id="billAdd">Add Bill</button></div>';

  // ─── Dismissed items (collapsed) ───
  if(dismissed.length>0){
    html+='<div class="sec fi"><div class="stitle" style="color:var(--dim)">Dismissed ('+dismissed.length+')</div>';
    html+='<div style="font-size:11px;color:var(--dim);margin-bottom:8px">Items you dismissed or marked as not a bill.</div>';
    dismissed.forEach(function(it){
      html+='<div class="item-card" style="opacity:.6"><div class="item-top"><div><div class="item-name" style="text-decoration:line-through">'+escHtml(it.name)+'</div><div class="item-detail">'+escHtml(it.detectionStatus==="not_bill"||it.detectionStatus==="not_relevant"?"Marked as not relevant":"Dismissed")+'</div></div><div style="text-align:right"><div style="font-size:14px;color:var(--dim)">'+f(it.amount)+'</div></div></div>';
      html+='<div class="item-actions"><button class="btn-sm" data-restore-bill="'+it.id+'" style="color:var(--blue)">Restore</button><button class="btn-sm btn-danger" data-del-bill="'+it.id+'">Delete</button></div></div>';
    });
    html+='</div>';
  }

  return html;
}

function renderBillCard(it){
  var status=it.status||"pending";
  var html='<div class="item-card"><div class="item-top"><div><div class="item-name">'+escHtml(it.name)+'</div><div class="item-detail">Due: day '+(it.dueDate||"?")+ ' &middot; '+escHtml(it.method||"Manual")+(it.source==="upload"?' &middot; <span style="color:var(--purple)">From statement</span>':'')+'</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:700">'+f(it.amount)+'</div><div class="status-pill '+status+'">'+status+'</div></div></div>';
  html+='<div class="item-actions"><button class="btn-sm btn-edit" data-toggle-bill="'+it.id+'">Toggle Status</button><button class="btn-sm btn-danger" data-del-bill="'+it.id+'">Remove</button></div></div>';
  return html;
}

function getBillStatus(bill){
  return bill.status||"pending";
}

function bindBillsEvents(){
  var addBtn=document.getElementById("billAdd");
  if(addBtn)addBtn.addEventListener("click",async function(){
    var name=document.getElementById("billName").value.trim();
    if(!name){toast("Please enter bill name",true);return}
    addBtn.disabled=true;
    await hubAdd("bills",{name:name,amount:parseFloat(document.getElementById("billAmt").value)||0,dueDate:document.getElementById("billDue").value||"",frequency:document.getElementById("billFreq")?document.getElementById("billFreq").value:"Monthly",method:document.getElementById("billMethod").value,status:"pending",source:"manual",detectionStatus:"confirmed",notes:document.getElementById("billNotes")?document.getElementById("billNotes").value.trim():""});
    await hubLoad("bills");toast("Bill added");render();
  });
  // Confirm detected bill
  document.querySelectorAll("[data-confirm-bill]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["bills"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.confirmBill});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="confirmed";
      item.status="pending";
      await hubUpdate("bills",item);
      await hubLoad("bills");toast("Bill confirmed and now tracked");render();
    });
  });
  // Edit detected bill
  document.querySelectorAll("[data-edit-detected-bill]").forEach(function(b){
    b.addEventListener("click",function(){
      var items=(hubCache["bills"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.editDetectedBill});
      if(!item)return;
      var newName=prompt("Bill name:",item.name||"");
      if(newName===null)return;
      var newAmt=prompt("Amount (£):",item.amount||"");
      if(newAmt===null)return;
      var newDue=prompt("Due date (day of month, 1-31):",item.dueDate||"");
      if(newDue===null)return;
      item.name=newName.trim()||item.name;
      item.amount=parseFloat(newAmt)||item.amount;
      item.dueDate=newDue||item.dueDate;
      item.detectionStatus="edited_confirmed";
      item.status="pending";
      hubUpdate("bills",item).then(function(){hubLoad("bills").then(function(){toast("Bill edited and confirmed");render()})});
    });
  });
  // Dismiss detected bill
  document.querySelectorAll("[data-dismiss-bill]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["bills"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.dismissBill});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="dismissed";
      await hubUpdate("bills",item);
      await hubLoad("bills");toast("Dismissed");render();
    });
  });
  // Mark as not a bill
  document.querySelectorAll("[data-notbill]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["bills"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.notbill});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="not_relevant";
      await hubUpdate("bills",item);
      await hubLoad("bills");toast("Marked as not relevant");render();
    });
  });
  // Restore dismissed item back to detected
  document.querySelectorAll("[data-restore-bill]").forEach(function(b){
    b.addEventListener("click",async function(){
      var items=(hubCache["bills"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.restoreBill});
      if(!item)return;
      b.disabled=true;
      item.detectionStatus="detected";
      item.status="pending";
      await hubUpdate("bills",item);
      await hubLoad("bills");toast("Restored for review");render();
    });
  });
  // Delete bill
  document.querySelectorAll("[data-del-bill]").forEach(function(b){
    b.addEventListener("click",async function(){
      await hubDelete("bills",b.dataset.delBill);await hubLoad("bills");toast("Removed");render();
    });
  });
  // Toggle bill status
  document.querySelectorAll("[data-toggle-bill]").forEach(function(b){
    b.addEventListener("click",function(){
      var items=(hubCache["bills"]||{items:[]}).items;
      var item=items.find(function(i){return i.id===b.dataset.toggleBill});
      if(!item)return;
      var states=["paid","pending","overdue"];
      var idx=states.indexOf(item.status||"pending");
      item.status=states[(idx+1)%3];
      hubUpdate("bills",item).then(function(){hubLoad("bills").then(function(){toast("Status: "+item.status);render()})});
    });
  });
}

// ───────── EMERGENCY & SAFETY LAYER VIEW ─────────
function emergencyView(){
  var data=hubCache["emergency"]||{items:[]};
  var items=data.items||[];
  // Use first item as main emergency data, rest as insurance policies
  var main=items.find(function(i){return i.itemType==="emergency-fund"})||{};
  var insurances=items.filter(function(i){return i.itemType==="insurance"});
  var contacts=items.filter(function(i){return i.itemType==="contact"});
  var backupPlan=items.find(function(i){return i.itemType==="backup-plan"})||{};

  var fundAmount=parseFloat(main.amount||0);
  var monthlyExpenses=parseFloat(main.monthlyExpenses||0);
  var monthsCovered=monthlyExpenses>0?Math.round(fundAmount/monthlyExpenses*10)/10:0;
  var html=hubBackBtn("Emergency & Safety");

  html+='<div class="summary-grid fi">';
  html+='<div class="summary-stat" style="border-color:rgba(245,158,11,.2)"><div class="ss-val" style="color:var(--amber)">'+f(fundAmount)+'</div><div class="ss-label">Emergency Fund</div></div>';
  html+='<div class="summary-stat" style="border-color:rgba(245,158,11,.2)"><div class="ss-val" style="color:'+(monthsCovered>=3?"var(--green)":monthsCovered>=1?"var(--amber)":"var(--red)")+'">'+monthsCovered+'</div><div class="ss-label">Months Covered</div></div>';
  html+='</div>';
  if(monthsCovered<3)html+='<div style="background:var(--abg);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:var(--amber)">&#9888; Experts recommend 3-6 months of expenses in your emergency fund.</div>';

  // Emergency fund form
  html+='<div class="ccard fi"><h3>Emergency Fund</h3>';
  html+='<div class="form-group"><label class="form-label">Fund Amount (£)</label><input class="form-input" id="emAmount" type="number" step="0.01" value="'+(main.amount||"")+'" placeholder="0.00"></div>';
  html+='<div class="form-group"><label class="form-label">Monthly Expenses (£)</label><input class="form-input" id="emExpenses" type="number" step="0.01" value="'+(main.monthlyExpenses||"")+'" placeholder="For calculating months covered"></div>';
  html+='<button class="btn-primary" id="emSave">Save Emergency Fund</button></div>';

  // Insurance policies
  html+='<div class="ccard fi"><h3>Insurance Policies</h3>';
  html+='<div class="form-group"><label class="form-label">Policy Name</label><input class="form-input" id="insName" placeholder="e.g. Home Insurance, Life Insurance"></div>';
  html+='<div class="form-group"><label class="form-label">Provider</label><input class="form-input" id="insProvider" placeholder="e.g. Aviva, Admiral"></div>';
  html+='<div class="form-group"><label class="form-label">Monthly Cost (£)</label><input class="form-input" id="insCost" type="number" step="0.01" placeholder="0.00"></div>';
  html+='<button class="btn-primary" id="insAdd" style="margin-top:8px">Add Policy</button>';
  if(insurances.length>0){
    insurances.forEach(function(ins){
      html+='<div class="item-card" style="margin-top:8px"><div class="item-top"><div><div class="item-name">'+escHtml(ins.name)+'</div><div class="item-detail">'+escHtml(ins.provider||"")+(ins.cost?' &middot; '+f(ins.cost)+'/mo':'')+'</div></div></div><div class="item-actions"><button class="btn-sm btn-danger" data-del-em="'+ins.id+'">Remove</button></div></div>';
    });
  }
  html+='</div>';

  // Important contacts
  html+='<div class="ccard fi"><h3>Financial Contacts</h3>';
  html+='<div class="form-group"><label class="form-label">Contact Name</label><input class="form-input" id="conName" placeholder="e.g. Financial Advisor, Accountant"></div>';
  html+='<div class="form-group"><label class="form-label">Phone / Details</label><input class="form-input" id="conDetails" placeholder="Phone number or details"></div>';
  html+='<button class="btn-primary" id="conAdd" style="margin-top:8px">Add Contact</button>';
  if(contacts.length>0){
    contacts.forEach(function(c){
      html+='<div class="item-card" style="margin-top:8px"><div class="item-top"><div><div class="item-name">'+escHtml(c.name)+'</div><div class="item-detail">'+escHtml(c.details||"")+'</div></div></div><div class="item-actions"><button class="btn-sm btn-danger" data-del-em="'+c.id+'">Remove</button></div></div>';
    });
  }
  html+='</div>';

  // Backup cash plan
  html+='<div class="ccard fi"><h3>Backup Cash Plan</h3>';
  html+='<div class="form-group"><label class="form-label">Your backup plan notes</label><input class="form-input" id="backupPlan" value="'+escHtml(backupPlan.notes||"")+'" placeholder="e.g. Sell investments, borrow from family, use credit line..."></div>';
  html+='<button class="btn-primary" id="backupSave">Save Plan</button></div>';

  return html;
}

function financialGoalsView(){

function bindGoalsEvents(){

  });
  document.querySelectorAll("[data-del-fg]").forEach(function(b){
    b.addEventListener("click",async function(){
      await hubDelete("financial-goals",b.dataset.delFg);await hubLoad("financial-goals");toast("Removed");render();
    });
  });
}

// ───────── DATA PERSISTENCE (save/load transactions to Netlify Blobs) ─────────
async function saveTransactionsToBlobs(){
  if(!D||!D.transactions)return;
  try{
    await fetch("/api/hub-data?collection=uploaded-transactions",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"set",data:{items:D.transactions,analysis:D.analysis,savedAt:new Date().toISOString()}})
    });
  }catch(e){/* silent */}
}

async function loadTransactionsFromBlobs(){
  try{
    var r=await fetch("/api/hub-data?collection=uploaded-transactions");
    var data=await r.json();
    if(data&&data.items&&data.items.length>0){
      D={transactions:data.items,analysis:data.analysis||{},success:true};
      buildAccounts();
      if(!D.analysis||!D.analysis.categoryBreakdown){
        recalcAnalysis();
      }
      return true;
    }
  }catch(e){/* silent */}
  return false;
}

// ───────── SYNC TRANSACTIONS TO HUB (bills, subscriptions, income, budget, etc.) ─────────
// Helper: compare two DD/MM/YYYY dates properly (returns true if a is later than b)
function dateIsLater(a,b){
  var da=parseDateFlex(a),db=parseDateFlex(b);
  if(!da)return false;
  if(!db)return true;
  return da.getTime()>db.getTime();
}

// Helper: infer frequency from transaction dates
function inferFrequency(dates){
  if(dates.length<2)return"Monthly";
  var parsed=dates.map(function(d){return parseDateFlex(d)}).filter(function(d){return d!==null});
  if(parsed.length<2)return"Monthly";
  parsed.sort(function(a,b){return a.getTime()-b.getTime()});
  var gaps=[];
  for(var i=1;i<parsed.length;i++){
    gaps.push(Math.round((parsed[i]-parsed[i-1])/(1000*60*60*24)));
  }
  var avg=gaps.reduce(function(s,g){return s+g},0)/gaps.length;
  if(avg<=10)return"Weekly";
  if(avg<=21)return"Bi-Weekly";
  if(avg<=45)return"Monthly";
  if(avg<=120)return"Quarterly";
  return"Yearly";
}

async function syncTransactionsToHub(){
  if(!D||!D.transactions)return;
  var confirmed=D.transactions.filter(function(t){return t.confirmed!==false});

  // Extract unique recurring bills from "Bills & Utilities" transactions
  var billTxns=confirmed.filter(function(t){return t.category==="Bills & Utilities"});
  var billGroups={};
  billTxns.forEach(function(t){
    var key=normalizeDesc(t.description);
    if(!billGroups[key]){
      billGroups[key]={name:t.description,total:0,count:0,amounts:[],lastDate:"",dates:[]};
    }
    billGroups[key].total+=txAmt(t);
    billGroups[key].count++;
    billGroups[key].amounts.push(txAmt(t));
    if(t.date)billGroups[key].dates.push(t.date);
    if(dateIsLater(t.date,billGroups[key].lastDate))billGroups[key].lastDate=t.date;
  });

  // Extract subscriptions
  var subTxns=confirmed.filter(function(t){return t.category==="Subscriptions"});
  var subGroups={};
  subTxns.forEach(function(t){
    var key=normalizeDesc(t.description);
    if(!subGroups[key]){
      subGroups[key]={name:t.description,total:0,count:0,amounts:[],lastDate:"",dates:[]};
    }
    subGroups[key].total+=txAmt(t);
    subGroups[key].count++;
    subGroups[key].amounts.push(txAmt(t));
    if(t.date)subGroups[key].dates.push(t.date);
    if(dateIsLater(t.date,subGroups[key].lastDate))subGroups[key].lastDate=t.date;
  });

  // Extract income sources
  var incomeTxns=confirmed.filter(function(t){return t.type==="Income"});
  var incomeGroups={};
  incomeTxns.forEach(function(t){
    var key=normalizeDesc(t.description);
    if(!incomeGroups[key]){
      incomeGroups[key]={name:t.description,total:0,count:0,amounts:[],category:t.category,lastDate:"",dates:[]};
    }
    incomeGroups[key].total+=txAmt(t);
    incomeGroups[key].count++;
    incomeGroups[key].amounts.push(txAmt(t));
    if(t.date)incomeGroups[key].dates.push(t.date);
    if(dateIsLater(t.date,incomeGroups[key].lastDate))incomeGroups[key].lastDate=t.date;
  });

  // Sync bills to hub
  try{
    var existingBills=await fetch("/api/hub-data?collection=bills").then(function(r){return r.json()});
    var existingBillMap={};
    (existingBills.items||[]).forEach(function(b){existingBillMap[normalizeDesc(b.name)]=b});

    for(var bk in billGroups){
      var bg=billGroups[bk];
      var avgAmt=Math.round(bg.total/bg.count*100)/100;
      var billFreq=inferFrequency(bg.dates);
      var lastPaid=dateToISO(bg.lastDate);
      var existing=existingBillMap[bk];
      if(!existing){
        await fetch("/api/hub-data?collection=bills",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"add",item:{name:bg.name,amount:avgAmt,dueDate:"",frequency:billFreq,method:"Auto-detected from statement",status:"pending",source:"upload",detectionStatus:"detected",confidence:bg.count>=3?"High":bg.count>=2?"Medium":"Low",lastPaidDate:lastPaid,occurrences:bg.count}})
        });
      }else if(existing.detectionStatus==="detected"||!existing.detectionStatus){
        // Update existing detected/legacy items with fresh data
        existing.amount=avgAmt;
        existing.frequency=existing.frequency||billFreq;
        existing.confidence=bg.count>=3?"High":bg.count>=2?"Medium":"Low";
        existing.lastPaidDate=lastPaid||existing.lastPaidDate||"";
        existing.occurrences=bg.count;
        existing.source="upload";
        if(!existing.detectionStatus)existing.detectionStatus="detected";
        await fetch("/api/hub-data?collection=bills",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"update",item:existing})
        });
      }
    }
  }catch(e){/* silent */}

  // Sync subscriptions to hub
  try{
    var existingSubs=await fetch("/api/hub-data?collection=subscriptions").then(function(r){return r.json()});
    var existingSubMap={};
    (existingSubs.items||[]).forEach(function(s){existingSubMap[normalizeDesc(s.name)]=s});

    for(var sk in subGroups){
      var sg=subGroups[sk];
      var avgSubAmt=Math.round(sg.total/sg.count*100)/100;
      var subFreq=inferFrequency(sg.dates);
      var lastCharged=dateToISO(sg.lastDate);
      var existingSub=existingSubMap[sk];
      if(!existingSub){
        await fetch("/api/hub-data?collection=subscriptions",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"add",item:{name:sg.name,amount:avgSubAmt,frequency:subFreq,status:"active",source:"upload",detectionStatus:"detected",confidence:sg.count>=3?"High":sg.count>=2?"Medium":"Low",lastChargedDate:lastCharged,occurrences:sg.count}})
        });
      }else if(existingSub.detectionStatus==="detected"||!existingSub.detectionStatus){
        existingSub.amount=avgSubAmt;
        existingSub.frequency=existingSub.frequency||subFreq;
        existingSub.confidence=sg.count>=3?"High":sg.count>=2?"Medium":"Low";
        existingSub.lastChargedDate=lastCharged||existingSub.lastChargedDate||"";
        existingSub.occurrences=sg.count;
        existingSub.source="upload";
        if(!existingSub.detectionStatus)existingSub.detectionStatus="detected";
        await fetch("/api/hub-data?collection=subscriptions",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"update",item:existingSub})
        });
      }
    }
  }catch(e){/* silent */}

  // Sync income sources to hub
  try{
    var existingIncome=await fetch("/api/hub-data?collection=income").then(function(r){return r.json()});
    var existingIncMap={};
    (existingIncome.items||[]).forEach(function(i){existingIncMap[normalizeDesc(i.name)]=i});

    for(var ik in incomeGroups){
      var ig=incomeGroups[ik];
      var avgIncAmt=Math.round(ig.total/ig.count*100)/100;
      var incType=ig.category==="Income"?"Salary":"Irregular Income";
      if(ig.name.toLowerCase().match(/freelance|invoice|contract/))incType="Freelance Income";
      if(ig.name.toLowerCase().match(/refund|cashback|reversal/))incType="Irregular Income";
      if(ig.name.toLowerCase().match(/interest|dividend/))incType="Passive Income";
      var incFreq=inferFrequency(ig.dates);
      if(ig.count<2)incFreq="One-Off";
      var incLastDate=dateToISO(ig.lastDate);
      var existingInc=existingIncMap[ik];
      if(!existingInc){
        await fetch("/api/hub-data?collection=income",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"add",item:{name:ig.name,type:incType,amount:avgIncAmt,frequency:incFreq,source:"upload",detectionStatus:"detected",confidence:ig.count>=3?"High":ig.count>=2?"Medium":"Low",lastReceivedDate:incLastDate,occurrences:ig.count}})
        });
      }else if(existingInc.detectionStatus==="detected"||!existingInc.detectionStatus){
        existingInc.amount=avgIncAmt;
        existingInc.type=existingInc.type||incType;
        existingInc.frequency=existingInc.frequency||incFreq;
        existingInc.confidence=ig.count>=3?"High":ig.count>=2?"Medium":"Low";
        existingInc.lastReceivedDate=incLastDate||existingInc.lastReceivedDate||"";
        existingInc.occurrences=ig.count;
        existingInc.source="upload";
        if(!existingInc.detectionStatus)existingInc.detectionStatus="detected";
        await fetch("/api/hub-data?collection=income",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"update",item:existingInc})
        });
      }
    }
  }catch(e){/* silent */}

  // Sync budget actuals from confirmed expense categories
  try{
    var existingBudget=await fetch("/api/hub-data?collection=budget").then(function(r){return r.json()});
    var existingBudgetCats=(existingBudget.items||[]).map(function(b){return b.category?b.category.toLowerCase():""});
    var curMonth=new Date().toISOString().slice(0,7);

    // Build category totals from confirmed expenses
    var catTotals={};
    confirmed.filter(function(t){return t.type==="Expense"}).forEach(function(t){
      if(!catTotals[t.category])catTotals[t.category]=0;
      catTotals[t.category]+=txAmt(t);
    });

    // Update existing budget lines with actual amounts or add new ones
    for(var cat in catTotals){
      if(cat==="Uncategorized"||cat==="Pending Review")continue;
      var actual=Math.round(catTotals[cat]*100)/100;
      var existingLine=(existingBudget.items||[]).find(function(b){return b.category&&b.category.toLowerCase()===cat.toLowerCase()&&b.month===curMonth});
      if(existingLine){
        existingLine.actual=actual;
        await fetch("/api/hub-data?collection=budget",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"update",item:existingLine})
        });
      }else if(existingBudgetCats.indexOf(cat.toLowerCase())===-1){
        await fetch("/api/hub-data?collection=budget",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"add",item:{category:cat,budgetType:"expense",planned:0,actual:actual,month:curMonth,source:"upload"}})
        });
      }
    }
  }catch(e){/* silent */}

  // Reload hub caches that were updated
  try{
    await Promise.all([hubLoad("bills"),hubLoad("subscriptions"),hubLoad("income"),hubLoad("budget")]);
  }catch(e){/* silent */}
}

// ───────── INIT ─────────
// Load saved transactions on page load
(async function(){
  var loaded=await loadTransactionsFromBlobs();
  if(loaded)render();
})();
render();
</script>
