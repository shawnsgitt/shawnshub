<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1a">
<title>Finance Hub</title>
<link rel="manifest" href="/manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--s1:#111827;--s2:#1a2235;--card:#1e293b;--border:#2d3a52;--text:#f1f5f9;--muted:#94a3b8;--dim:#64748b;--green:#22c55e;--gbg:rgba(34,197,94,.1);--red:#ef4444;--rbg:rgba(239,68,68,.1);--purple:#a855f7;--pbg:rgba(168,85,247,.1);--amber:#f59e0b;--abg:rgba(245,158,11,.1);--blue:#3b82f6;--teal:#14b8a6;--coral:#f97316;--pink:#ec4899;--cyan:#06b6d4}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:0 0 88px;overflow-x:hidden}
.wrap{max-width:600px;margin:0 auto;padding:0 16px}
.head{padding:max(env(safe-area-inset-top),16px) 0 12px;display:flex;align-items:center;justify-content:space-between}
.head h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes sp{to{transform:rotate(360deg)}}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.k{border-radius:14px;padding:14px 16px;border:1px solid var(--border)}
.k .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.k .v{font-size:24px;font-weight:700;letter-spacing:-.5px}
.k .sub{font-size:11px;margin-top:3px;color:var(--muted)}
.k.g{background:var(--gbg);border-color:rgba(34,197,94,.15)}.k.g .v{color:var(--green)}
.k.r{background:var(--rbg);border-color:rgba(239,68,68,.15)}.k.r .v{color:var(--red)}
.k.p{background:var(--pbg);border-color:rgba(168,85,247,.15)}.k.p .v{color:var(--purple)}
.k.a{background:var(--abg);border-color:rgba(245,158,11,.15)}.k.a .v{color:var(--amber)}
.k.b{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.15)}.k.b .v{color:var(--blue)}
.sec{margin-bottom:22px}
.stitle{font-size:13px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.ccard{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.ccard h3{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:500}
.cwrap{position:relative;height:220px}
.row{display:flex;align-items:center;gap:10px;background:var(--s1);border-radius:12px;padding:11px 14px;margin-bottom:6px;cursor:default}
.row.clickable{cursor:pointer}
.row.clickable:active{background:var(--s2)}
.dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.rname{flex:1;font-size:13px;font-weight:500}
.ramt{font-size:13px;font-weight:700}
.rbar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:5px}
.rbar span{display:block;height:4px;border-radius:2px;transition:width .8s ease}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(17,24,39,.85);border-top:1px solid var(--border);display:flex;justify-content:center;gap:20px;padding:10px 0 max(env(safe-area-inset-bottom),10px);z-index:10;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--dim);font-size:10px;font-weight:500;cursor:pointer;transition:color .15s;-webkit-tap-highlight-color:transparent}
.ni.on{color:var(--purple)}
.ni svg{width:20px;height:20px}
.fi{animation:fi .35s ease both;opacity:0}
@keyframes fi{to{opacity:1}}

.upload-zone{border:2px dashed var(--border);border-radius:16px;padding:40px 20px;text-align:center;transition:border-color .2s,background .2s;cursor:pointer;margin-bottom:16px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--purple);background:var(--pbg)}
.upload-zone svg{width:48px;height:48px;color:var(--dim);margin-bottom:12px}
.upload-zone p{color:var(--muted);font-size:14px;margin-bottom:4px}
.upload-zone .hint{font-size:11px;color:var(--dim)}
.upload-zone input{display:none}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s ease}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px max(env(safe-area-inset-bottom),24px);width:100%;max-width:540px;max-height:70vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:6px}
.modal .modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.modal .cat-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .1s}
.modal .cat-opt:active{background:var(--s2)}
.modal .cat-opt .dot{width:12px;height:12px}
.modal .cat-opt span{font-size:14px}
.modal-close{margin-top:16px;width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:14px;font-weight:600;cursor:pointer}

/* Batch categorization wizard */
.batch-modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px max(env(safe-area-inset-bottom),24px);width:100%;max-width:600px;max-height:85vh;display:flex;flex-direction:column}
.batch-header{flex-shrink:0;margin-bottom:12px}
.batch-header h3{font-size:18px;font-weight:700;margin-bottom:4px}
.batch-header .batch-stats{font-size:12px;color:var(--muted)}
.batch-search{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:13px;margin-bottom:12px;outline:none;flex-shrink:0}
.batch-search:focus{border-color:var(--purple)}
.batch-search::placeholder{color:var(--dim)}
.batch-tabs{display:flex;gap:6px;margin-bottom:12px;flex-shrink:0;overflow-x:auto;padding-bottom:4px}
.batch-tab{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--s1);color:var(--dim);border:1px solid var(--border);transition:all .15s}
.batch-tab.on{background:var(--pbg);color:var(--purple);border-color:rgba(168,85,247,.3)}
.batch-body{flex:1;overflow-y:auto;margin-bottom:12px}
.group-card{background:var(--s1);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);transition:border-color .15s}
.group-card.selected{border-color:var(--purple)}
.group-top{display:flex;align-items:center;gap:10px;cursor:pointer}
.group-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px;color:transparent}
.group-check.on{background:var(--purple);border-color:var(--purple);color:#fff}
.group-info{flex:1;min-width:0}
.group-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.group-meta{font-size:11px;color:var(--dim);margin-top:2px}
.group-amt{font-size:14px;font-weight:700;color:var(--red);flex-shrink:0}
.group-expand{cursor:pointer;padding:4px;color:var(--dim);font-size:11px;transition:color .15s}
.group-expand:hover{color:var(--text)}
.group-txns{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.group-txn{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:11px;color:var(--muted)}
.group-txn .txn-desc{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.batch-actions{flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.batch-apply-bar{display:flex;gap:8px;align-items:center}
.batch-cat-select{flex:1;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:13px;font-weight:600;appearance:none;cursor:pointer;outline:none}
.batch-apply-btn{padding:12px 20px;border-radius:12px;border:none;background:var(--purple);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.batch-apply-btn:disabled{opacity:.4;cursor:not-allowed}
.batch-apply-btn:not(:disabled):active{opacity:.8}
.batch-done-btn{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:14px;font-weight:600;cursor:pointer}
.select-all-row{display:flex;align-items:center;gap:8px;padding:8px 0;margin-bottom:8px;cursor:pointer;flex-shrink:0}
.select-all-row span{font-size:12px;font-weight:600;color:var(--muted)}

.toast{position:fixed;top:max(env(safe-area-inset-top),16px);left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;animation:fi .3s ease;pointer-events:none}
.toast.err{background:var(--red)}

.badge{font-size:9px;padding:3px 7px;border-radius:5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge.inc{background:var(--gbg);color:var(--green)}
.badge.exp{background:var(--rbg);color:var(--red)}
.badge.sav{background:var(--pbg);color:var(--purple)}

.rec-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.rec-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.rec-icon.critical{background:var(--rbg);color:var(--red)}
.rec-icon.warning{background:var(--abg);color:var(--amber)}
.rec-icon.suggestion{background:rgba(59,130,246,.1);color:var(--blue)}
.rec-icon.positive{background:var(--gbg);color:var(--green)}
.rec-icon.info{background:rgba(6,182,212,.1);color:var(--cyan)}
.rec-body h4{font-size:14px;font-weight:600;margin-bottom:4px}
.rec-body p{font-size:12px;color:var(--muted);line-height:1.5}

.uncat-banner{background:var(--abg);border:1px solid rgba(245,158,11,.3);border-radius:14px;padding:16px;margin-bottom:16px;cursor:pointer;transition:background .2s}
.uncat-banner:active{background:rgba(245,158,11,.15)}
.uncat-banner h3{font-size:14px;color:var(--amber);font-weight:600;margin-bottom:4px}
.uncat-banner p{font-size:12px;color:var(--muted)}

.progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;margin:8px 0;overflow:hidden}
.progress-bar span{display:block;height:100%;border-radius:3px;transition:width .5s ease}

.clear-btn{padding:8px 14px;border-radius:10px;border:1px solid rgba(239,68,68,.3);background:var(--rbg);color:var(--red);font-size:11px;font-weight:600;cursor:pointer}
.clear-btn:active{opacity:.7}

.empty{text-align:center;padding:60px 20px}
.empty svg{width:56px;height:56px;color:var(--dim);margin-bottom:16px}
.empty h2{font-size:18px;margin-bottom:8px;font-weight:700}
.empty p{color:var(--muted);font-size:13px;line-height:1.5}

@media(min-width:600px){.kgrid{grid-template-columns:repeat(4,1fr)}.cwrap{height:240px}}

.flow-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;margin-bottom:8px}
.flow-bar>div{transition:width .8s ease}
.flow-legend{display:flex;gap:12px;flex-wrap:wrap}
.flow-legend span{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block}
.top-cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.top-cat{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);text-align:center}
.top-cat .rank{font-size:12px;font-weight:800;color:var(--purple);margin-bottom:4px}
.top-cat .cat-name{font-size:12px;font-weight:600;margin:4px 0}
.top-cat .cat-amt{font-size:18px;font-weight:700}
.acct-sel{margin-bottom:16px;display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.acct-pill{padding:7px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--s1);color:var(--dim);border:1px solid var(--border);transition:all .15s}
.acct-pill.on{background:var(--pbg);color:var(--purple);border-color:rgba(168,85,247,.3)}
.txn-list-item{display:flex;align-items:center;gap:10px;background:var(--s1);border-radius:12px;padding:12px 14px;margin-bottom:6px;border:1px solid transparent;transition:border-color .15s}
.txn-list-item:active{border-color:var(--border)}
.txn-list-item .txn-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.txn-list-item .txn-details{flex:1;min-width:0}
.txn-list-item .txn-desc-line{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-list-item .txn-meta-line{font-size:10px;color:var(--dim);margin-top:3px;display:flex;align-items:center;gap:6px}
.txn-list-item .txn-amount{font-size:14px;font-weight:700;flex-shrink:0;text-align:right}
.txn-list-item .txn-amount .txn-bal{font-size:10px;color:var(--dim);font-weight:400;margin-top:2px}
.txn-filter-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.txn-filter{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--s1);color:var(--dim);border:1px solid var(--border);transition:all .15s}
.txn-filter.on{background:var(--pbg);color:var(--purple);border-color:rgba(168,85,247,.3)}
.txn-search{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:13px;margin-bottom:12px;outline:none}
.txn-search:focus{border-color:var(--purple)}
.txn-search::placeholder{color:var(--dim)}

.snap-hero{text-align:center;padding:24px 0 20px}
.snap-hero .nw-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.snap-hero .nw-val{font-size:40px;font-weight:800;letter-spacing:-1px}
.snap-hero .nw-sub{font-size:12px;color:var(--dim);margin-top:4px}
.snap-row{display:flex;gap:10px;margin-bottom:10px}
.snap-card{flex:1;border-radius:14px;padding:16px;border:1px solid var(--border);background:var(--card)}
.snap-card .sc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.snap-card .sc-val{font-size:22px;font-weight:700;letter-spacing:-.3px}
.snap-card .sc-sub{font-size:10px;color:var(--dim);margin-top:4px}
.snap-card.green .sc-val{color:var(--green)}
.snap-card.red .sc-val{color:var(--red)}
.snap-card.purple .sc-val{color:var(--purple)}
.snap-card.amber .sc-val{color:var(--amber)}
.snap-card.blue .sc-val{color:var(--blue)}
.snap-divider{height:1px;background:var(--border);margin:18px 0}
.snap-section-title{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<nav>
<div class="ni on" data-v="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></div>
<div class="ni" data-v="upload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>Upload</span></div>
<div class="ni" data-v="overview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Overview</span></div>
<div class="ni" data-v="spending"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 100 4 2 2 0 000-4z"/></svg><span>Spending</span></div>
<div class="ni" data-v="transactions"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>Transactions</span></div>
</nav>

<script>
var CATS=["Groceries","Eating Out","Transport","Shopping","Subscriptions","Bills & Utilities","Health & Fitness","Entertainment","Education","Personal Care","Family Support","Cash Transfer","Income","Savings","Cash Withdrawal","Cash In","Bank Fees","Balance Carried Forward","Uncategorized"];
var CC={"Groceries":"#22c55e","Transport":"#3b82f6","Eating Out":"#ef4444","Family Support":"#f97316","Bills & Utilities":"#8b5cf6","Shopping":"#ec4899","Subscriptions":"#06b6d4","Education":"#6366f1","Health & Fitness":"#14b8a6","Entertainment":"#f59e0b","Personal Care":"#f472b6","Income":"#22c55e","Savings":"#a855f7","Cash Withdrawal":"#78716c","Cash In":"#059669","Cash Transfer":"#475569","Bank Fees":"#dc2626","Balance Carried Forward":"#334155","Uncategorized":"#64748b"};
function cc(n){return CC[n]||"#64748b"}
function f(n){return n==null?"£0":"£"+Math.abs(Math.round(n)).toLocaleString("en-GB")}

var D=null,charts={},cv="home",selAcct="all";

document.querySelectorAll(".ni").forEach(function(el){
  el.addEventListener("click",function(){
    cv=el.dataset.v;
    document.querySelectorAll(".ni").forEach(function(e){e.classList.toggle("on",e.dataset.v===cv)});
    destroyCharts();render();
  });
});

function destroyCharts(){Object.values(charts).forEach(function(c){c.destroy()});charts={}}

function toast(msg,isErr){
  var t=document.createElement("div");
  t.className="toast"+(isErr?" err":"");
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove()},2500);
}

function hasData(){return D&&D.transactions&&D.transactions.length>0}

function accounts(){
  if(!D||!D.accounts)return[];
  return Object.keys(D.accounts);
}

function filtered(){
  if(!D||!D.transactions)return[];
  if(selAcct==="all")return D.transactions;
  return D.accounts[selAcct]||[];
}

function acctSelector(){
  if(!hasData())return"";
  var accts=accounts();
  if(accts.length<=1)return"";
  var html='<div class="acct-sel fi">';
  html+='<div class="acct-pill'+(selAcct==="all"?" on":"")+'" data-acct="all">All Accounts</div>';
  accts.forEach(function(a){
    html+='<div class="acct-pill'+(selAcct===a?" on":"")+'" data-acct="'+escHtml(a)+'">'+escHtml(a)+'</div>';
  });
  html+='</div>';
  return html;
}

function bindAcctSelector(){
  document.querySelectorAll(".acct-pill").forEach(function(pill){
    pill.addEventListener("click",function(){
      selAcct=pill.dataset.acct;
      destroyCharts();render();
    });
  });
}

function expenses(){return filtered().filter(function(t){return t.type==="Expense"})}
function income(){return filtered().filter(function(t){return t.type==="Income"})}
function savings(){return filtered().filter(function(t){return t.type==="Savings"})}
function uncategorized(){return D?D.transactions.filter(function(t){return t.category==="Uncategorized"&&t.type!=="Non-Transactional"}):[]}
function tot(a){return a.reduce(function(s,r){return s+Math.abs(r.amount||r.absAmount||0)},0)}

function render(){
  var a=document.getElementById("app");
  destroyCharts();
  if(cv==="home")a.innerHTML=homeView();
  else if(cv==="upload")a.innerHTML=uploadView();
  else if(cv==="overview")a.innerHTML=dashboardView();
  else if(cv==="spending")a.innerHTML=breakdownView();
  else if(cv==="transactions")a.innerHTML=txnView();
  initCharts();
  bindUpload();
  bindUncatClicks();
  bindAcctSelector();
  bindTxnEvents();
}

// ───────── HOME / FINANCIAL SNAPSHOT ─────────
function latestBalance(acctName){
  var txns=D.accounts[acctName];
  if(!txns||!txns.length)return 0;
  var sorted=txns.slice().sort(function(a,b){
    if(a.date>b.date)return 1;if(a.date<b.date)return -1;return 0;
  });
  for(var i=sorted.length-1;i>=0;i--){
    if(sorted[i].balance!=null&&!isNaN(sorted[i].balance))return sorted[i].balance;
  }
  return 0;
}

function isDebtAccount(name){
  var n=name.toLowerCase();
  return n.indexOf("credit")!==-1||n.indexOf("card")!==-1||n.indexOf("loan")!==-1||n.indexOf("debt")!==-1||n.indexOf("overdraft")!==-1;
}

function latestMonth(){
  var all=filtered();
  if(!all.length)return null;
  var dates=all.map(function(t){
    var p=t.date.split("/");
    return{y:parseInt(p[2],10),m:parseInt(p[1],10)};
  });
  dates.sort(function(a,b){return b.y-a.y||b.m-a.m});
  return dates[0];
}

function monthlyTxns(){
  var lm=latestMonth();
  if(!lm)return[];
  return filtered().filter(function(t){
    var p=t.date.split("/");
    return parseInt(p[1],10)===lm.m&&parseInt(p[2],10)===lm.y;
  });
}

function monthName(m){
  var names=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return names[m]||"";
}

// ───────── BATCH CATEGORIZATION WIZARD ─────────
function normalizeDesc(desc){
  // Normalize transaction descriptions for grouping
  // Remove dates, reference numbers, amounts, trailing numbers
  var s = (desc||"").toLowerCase().trim();
  // Remove common reference patterns like "ref: xxx", "txn xxx", card numbers
  s = s.replace(/\b(ref|txn|transaction|card|payment)\s*[:# -]?\s*\d+\b/gi,"");
  // Remove dates in various formats
  s = s.replace(/\d{1,2}[\/\-\.]\d{1,2}([\/\-\.]\d{2,4})?/g,"");
  // Remove long number sequences (reference numbers, card numbers)
  s = s.replace(/\b\d{4,}\b/g,"");
  // Remove trailing numbers and extra whitespace
  s = s.replace(/\s+\d{1,3}\s*$/,"");
  // Remove currency symbols and amounts at end
  s = s.replace(/[£$€]\s*[\d,.]+/g,"");
  // Collapse whitespace
  s = s.replace(/\s+/g," ").trim();
  // Remove very short leftover (less than 3 chars)
  if(s.length<3) return (desc||"").toLowerCase().trim();
  return s;
}

function groupUncategorized(items){
  var map={};
  items.forEach(function(t){
    var key=normalizeDesc(t.description);
    if(!map[key]){
      map[key]={
        key:key,
        displayName:t.description,
        transactions:[],
        total:0,
        suggestion:null
      };
    }
    map[key].transactions.push(t);
    map[key].total+=t.absAmount;
    // Use the shortest description as display name (usually cleanest)
    if(t.description.length<map[key].displayName.length){
      map[key].displayName=t.description;
    }
  });
  // Add smart suggestions for each group
  Object.values(map).forEach(function(g){
    g.suggestion=smartSuggest(g.displayName,g.transactions);
  });
  // Sort groups by count descending (biggest groups first for efficiency)
  return Object.values(map).sort(function(a,b){return b.transactions.length-a.transactions.length});
}

// Smart suggestion engine: guesses likely category from description patterns
function smartSuggest(desc,txns){
  var lower=(desc||"").toLowerCase();
  // Balance carried forward — should not be categorized as expense/income
  if(/\b(balance carried|balance brought|balance c\/f|balance b\/f|balance c\/d|balance b\/d|opening balance|closing balance|carried forward|brought forward)\b/.test(lower)) return "Balance Carried Forward";
  // Cash transfers between own accounts
  if(/\b(transfer between|inter account|interaccount|internal transfer|own account|between accounts|acc transfer|account transfer|move money|move funds|sweep|self transfer|same name transfer)\b/.test(lower)) return "Cash Transfer";
  // Cash in / deposits
  if(/\b(cash deposit|cash in|cash payment in|counter deposit|counter credit|branch deposit|cash at branch|cash lodgement|lodgement)\b/.test(lower)) return "Cash In";
  // Cash Withdrawal
  if(/\b(atm|cash withdrawal|withdraw|cash send|cardless|cash back at)\b/.test(lower)) return "Cash Withdrawal";
  // Income
  if(/\b(salary|wages?|payroll|pay\s+from|income|commission|bonus|stipend|bursary|grant|payout|pension|benefit|annuity)\b/.test(lower)) return "Income";
  if(/\b(refund|reversal|cashback|reimburse|rebate|credit note|returned|money back)\b/.test(lower)) return "Income";
  if(/\b(sars|hmrc|tax refund|tax return|tax credit|dividend|interest earned|interest received|investment return)\b/.test(lower)) return "Income";
  if(/\b(freelance|invoice paid?|payment received|deposit from|credit received|reward)\b/.test(lower)) return "Income";
  // Bills & Utilities
  if(/\b(rent|landlord|property|estate agent|letting|tenant|lease)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(electric|electricity|gas\s|water|sewage|council|rates|levy|municipal|waste|refuse)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(insurance|insure|cover|policy|premium|assurance|old mutual|sanlam|liberty|discovery|hollard|outsurance|momentum|santam|miway)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(vodafone|mtn|vodacom|cell\s?c|ee\b|o2\b|giffgaff|three\b|telkom|airtel|rain\b|afrihost|fibre|broadband|internet|wifi|dstv|multichoice)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(mortgage|bond repayment|home loan|strata|body corporate|property management|maintenance fee|service charge)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(debit order|d\/o|direct debit|recurring payment|standing order)\b/.test(lower)&&!/\b(gym|fitness|netflix|spotify|amazon|disney)\b/.test(lower)) return "Bills & Utilities";
  // Transport
  if(/\b(uber|bolt|lyft|taxi|cab|ride|didi)\b/.test(lower)&&!/\b(eats|eat|food|delivery)\b/.test(lower)) return "Transport";
  if(/\b(fuel|petrol|diesel|garage|shell|bp\b|caltex|engen|sasol|esso|texaco|total\s+garage|filling station|gas station)\b/.test(lower)) return "Transport";
  if(/\b(parking|park\s|ncp|easy park|justpark)\b/.test(lower)) return "Transport";
  if(/\b(tfl|oyster|bus\b|train|rail|metro|tube|gautrain|rea vaya|myciti|golden arrow)\b/.test(lower)) return "Transport";
  if(/\b(toll|e-?toll|dart charge|congestion|vehicle|mot\s+test|car\s+service|tyre|mechanic|car\s+wash)\b/.test(lower)) return "Transport";
  // Eating Out
  if(/\b(restaurant|cafe|coffee|bistro|diner|eatery|canteen|kitchen)\b/.test(lower)) return "Eating Out";
  if(/\b(takeaway|take\s+away|delivery|uber\s*eats|deliveroo|just\s*eat|mr\s*delivery|door\s*dash|food\s+delivery)\b/.test(lower)) return "Eating Out";
  if(/\b(pizza|burger|chicken|sushi|ramen|kebab|curry|noodle|grill|steakhouse|bbq|bar\b|pub\b|tavern|lounge|cocktail|brewery|beer)\b/.test(lower)) return "Eating Out";
  // Groceries
  if(/\b(grocery|grocer|supermarket|fresh\s+market|butcher|bakery|greengrocer|fruit|veg|organic|deli)\b/.test(lower)) return "Groceries";
  // Shopping
  if(/\b(shop|store|mart|retail|buy|purchase|outlet|boutique|mall|plaza)\b/.test(lower)&&!/\b(coffee|food|eat|restaurant|grocery|body\s+shop)\b/.test(lower)) return "Shopping";
  if(/\b(clothing|fashion|shoes|apparel|accessories|jewel|watch|furniture|decor|hardware|tools|diy|garden|appliance)\b/.test(lower)) return "Shopping";
  if(/\b(online|click|e-?commerce|order|parcel)\b/.test(lower)&&!/\b(food|eat|delivery|uber|just\s*eat)\b/.test(lower)) return "Shopping";
  // Subscriptions
  if(/\b(subscri|member|renewal|recurring|monthly\s+fee|annual\s+fee|premium\s+plan)\b/.test(lower)) return "Subscriptions";
  // Health & Fitness
  if(/\b(gym|fitness|sport|active|exercise|workout|yoga|pilates|crossfit)\b/.test(lower)) return "Health & Fitness";
  if(/\b(pharmacy|chemist|medical|doctor|dr\s|clinic|hospital|dental|dentist|optom|physio|therapist|counsell|psychology|chiropract|pathology)\b/.test(lower)) return "Health & Fitness";
  if(/\b(vitamin|supplement|protein|wellness|medicine|prescription|dispens)\b/.test(lower)) return "Health & Fitness";
  // Entertainment
  if(/\b(cinema|movie|theatre|concert|ticket|event|show|performance|gallery|museum|zoo|aquarium|theme\s+park|arcade|bowling|escape\s+room|comedy|festival)\b/.test(lower)) return "Entertainment";
  if(/\b(gaming|steam|playstation|nintendo|xbox|epic\s+games)\b/.test(lower)) return "Entertainment";
  // Education
  if(/\b(school|university|college|tuition|course|academy|training|workshop|seminar|exam|certification|study|learning|textbook|stationery|education|student|bootcamp)\b/.test(lower)) return "Education";
  if(/\b(udemy|coursera|skillshare|book|kindle|library)\b/.test(lower)) return "Education";
  // Personal Care
  if(/\b(salon|barber|hairdresser|hair|beauty|nail|spa|wax|facial|massage|grooming|cosmetic|makeup|skincare|perfume)\b/.test(lower)) return "Personal Care";
  // Savings
  if(/\b(sav(e|ing)|invest|isa\b|premium\s+bond|unit\s+trust|money\s+market|fixed\s+deposit|etf|index\s+fund|retirement|provident)\b/.test(lower)) return "Savings";
  // Family Support
  if(/\b(church|charity|donat|tithe|offering|zakat|ngo|foundation|fundrais|sponsor)\b/.test(lower)) return "Family Support";
  if(/\b(transfer|trfr|eft|send|remit|allowance)\b/.test(lower)&&/\b(to\s|family|child|parent|mother|father|wife|husband|gift)\b/.test(lower)) return "Family Support";
  // Bank Fees
  if(/\b(fee|charge|admin|penalty|interest\s+charge|overdraft|insufficient|nsf|rejected|unpaid|bounce|ledger|service\s+fee|transaction\s+fee|card\s+fee|account\s+fee|monthly\s+fee|sms\s+fee)\b/.test(lower)) return "Bank Fees";
  // Fallback heuristics
  if(/\b(pos|point\s+of\s+sale|card\s+purchase)\b/.test(lower)) return "Shopping";
  if(/\b(pay|pymt|payment|debit\s+order|d\/o)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(transfer|trfr|eft|send|remit)\b/.test(lower)) return "Family Support";
  // Check amount patterns — very small recurring amounts might be subscriptions
  if(txns&&txns.length>=2){
    var amounts=txns.map(function(t){return t.absAmount});
    var allSame=amounts.every(function(a){return Math.abs(a-amounts[0])<0.1});
    if(allSame&&amounts[0]<100) return "Subscriptions";
  }
  return null;
}

// Helper: determine transaction type from category
function typeForCategory(cat){
  if(cat==="Balance Carried Forward"||cat==="Cash Transfer") return "Non-Transactional";
  if(cat==="Income"||cat==="Cash In") return "Income";
  if(cat==="Savings") return "Savings";
  return "Expense";
}

var batchState={groups:[],selected:{},expanded:{},search:"",view:"all"};

function openUncatWizard(){
  var items=uncategorized();
  if(items.length===0){toast("All transactions are categorized!");return}
  batchState.groups=groupUncategorized(items);
  batchState.selected={};
  batchState.expanded={};
  batchState.search="";
  batchState.view="all";
  showBatchModal();
}

function getFilteredGroups(){
  var groups=batchState.groups;
  var search=batchState.search.toLowerCase();
  if(search){
    groups=groups.filter(function(g){
      return g.displayName.toLowerCase().includes(search)||g.key.includes(search);
    });
  }
  if(batchState.view==="multi"){
    groups=groups.filter(function(g){return g.transactions.length>1});
  }else if(batchState.view==="single"){
    groups=groups.filter(function(g){return g.transactions.length===1});
  }else if(batchState.view==="suggested"){
    groups=groups.filter(function(g){return g.suggestion!=null});
  }
  return groups;
}

  var existing=document.querySelector(".modal-bg");
  if(existing)existing.remove();

  var items=uncategorized();
  if(items.length===0){
    recalcAnalysis();render();toast("All transactions categorized!");return;

  // Recompute groups from current uncategorized
  batchState.groups=groupUncategorized(items);

  var groups=getFilteredGroups();

  var multiGroups=batchState.groups.filter(function(g){return g.transactions.length>1});

  var selectedCount=Object.keys(batchState.selected).filter(function(k){return batchState.selected[k]}).length;
  var selectedTxnCount=0;
  groups.forEach(function(g){if(batchState.selected[g.key])selectedTxnCount+=g.transactions.length});
  var suggestedGroups=batchState.groups.filter(function(g){return g.suggestion!=null});
  var suggestedTxnCount=suggestedGroups.reduce(function(s,g){return s+g.transactions.length},0);

  var bg=document.createElement("div");
  bg.className="modal-bg";
  bg.innerHTML=
    '<div class="batch-modal">'+
      '<div class="batch-header">'+
        '<h3>Batch Categorize</h3>'+

function escHtml(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function bindBatchEvents(bg){
  // Search
  var searchInput=document.getElementById("batchSearch");
  var searchTimer;
  searchInput.addEventListener("input",function(){
    clearTimeout(searchTimer);
    searchTimer=setTimeout(function(){
      batchState.search=searchInput.value;
      showBatchModal();
    },250);
  });

  // Tabs
  bg.querySelectorAll(".batch-tab").forEach(function(tab){
    tab.addEventListener("click",function(){
      batchState.view=tab.dataset.bv;
      showBatchModal();
    });
  });

  // Accept All Suggestions button
  var acceptAllBtn=document.getElementById("acceptAllSuggestions");
  if(acceptAllBtn){
    acceptAllBtn.addEventListener("click",function(){
      var applied=0;
      var toLearn=[];
      batchState.groups.forEach(function(g){
        if(g.suggestion){
          g.transactions.forEach(function(t){
            t.category=g.suggestion;
            t.type=typeForCategory(g.suggestion);
            toLearn.push({description:t.description,category:g.suggestion});
          });
          applied+=g.transactions.length;
        }
      });
      learnCategories(toLearn);
      toast(applied+" transactions auto-categorized!");
      showBatchModal();
    });
  }

  // Select all
  var selectAllRow=document.getElementById("selectAll");
  if(selectAllRow){
    selectAllRow.addEventListener("click",function(){
      var groups=getFilteredGroups();
      var allSelected=groups.every(function(g){return batchState.selected[g.key]});
      groups.forEach(function(g){batchState.selected[g.key]=!allSelected});
      showBatchModal();
    });
  }

  // Group cards
  bg.querySelectorAll(".group-card").forEach(function(card){
    var key=card.dataset.gkey;
    card.querySelector('[data-action="toggle"]').addEventListener("click",function(){
      batchState.selected[key]=!batchState.selected[key];
      showBatchModal();
    });
    var expandBtn=card.querySelector('[data-action="expand"]');
    if(expandBtn){
      expandBtn.addEventListener("click",function(e){
        e.stopPropagation();
        batchState.expanded[key]=!batchState.expanded[key];
        showBatchModal();
      });
    }
    var quickAcceptBtn=card.querySelector('[data-action="quickAccept"]');
    if(quickAcceptBtn){
      quickAcceptBtn.addEventListener("click",function(e){
        e.stopPropagation();
        var cat=quickAcceptBtn.dataset.cat;
        var group=batchState.groups.find(function(g){return g.key===key});
        if(group){
          var toLearn=[];
          group.transactions.forEach(function(t){
            t.category=cat;
            t.type=typeForCategory(cat);
            toLearn.push({description:t.description,category:cat});
          });
          learnCategories(toLearn);
          toast(group.transactions.length+" categorized as "+cat);
          showBatchModal();
        }
      });
    }
  });

  // Apply button
  document.getElementById("batchApply").addEventListener("click",function(){
    var catSelect=document.getElementById("batchCatSelect");
    var cat=catSelect.value;
    if(!cat){toast("Please select a category first",true);return}
    var applied=0;
    var toLearn=[];
    batchState.groups.forEach(function(g){
      if(batchState.selected[g.key]){
        g.transactions.forEach(function(t){
          t.category=cat;
          t.type=typeForCategory(cat);
          toLearn.push({description:t.description,category:cat});
        });
        applied+=g.transactions.length;
      }
    });
    learnCategories(toLearn);
    // Clear selection for applied groups
    Object.keys(batchState.selected).forEach(function(k){
      if(batchState.selected[k])delete batchState.selected[k];
    });
    batchState.expanded={};
    toast(applied+" transactions categorized as "+cat);
    // Refresh — will recompute groups from remaining uncategorized
    showBatchModal();
  });

  // Done
  document.getElementById("batchDone").addEventListener("click",function(){
    bg.remove();
    recalcAnalysis();
    render();
    toast("Analysis updated");
  });
}

function recalcAnalysis(){
  if(!D||!D.transactions)return;
  var txns=D.transactions;
  var totalIncome=0,totalExpenses=0,totalSavings=0;
  txns.forEach(function(t){
    if(t.type==="Non-Transactional") return; // exclude balance c/f and cash transfers
    if(t.type==="Income")totalIncome+=t.absAmount;
    else if(t.type==="Savings")totalSavings+=t.absAmount;
    else totalExpenses+=t.absAmount;
  });
  D.analysis.totalIncome=Math.round(totalIncome*100)/100;
  D.analysis.totalExpenses=Math.round(totalExpenses*100)/100;
  D.analysis.totalSavings=Math.round(totalSavings*100)/100;
  D.analysis.net=Math.round((totalIncome-totalExpenses-totalSavings)*100)/100;

  // Recalc category breakdown
  var catMap={};
  txns.filter(function(t){return t.type==="Expense"}).forEach(function(t){
    if(!catMap[t.category])catMap[t.category]={total:0,count:0};
    catMap[t.category].total+=t.absAmount;
    catMap[t.category].count++;
  });
  D.analysis.categoryBreakdown=Object.entries(catMap).map(function(e){
    return{name:e[0],total:Math.round(e[1].total*100)/100,count:e[1].count,percentage:totalExpenses>0?Math.round(e[1].total/totalExpenses*1000)/10:0};
  }).sort(function(a,b){return b.total-a.total});
}

var txnState={filter:"all",search:"",page:0,pageSize:50};

function txnView(){
  if(!hasData())return emptyState("Transactions");
  var all=filtered();
  var search=txnState.search.toLowerCase();
  var filterType=txnState.filter;

  // Apply filters
  var txns=all.filter(function(t){
    if(filterType==="expense"&&t.type!=="Expense")return false;
    if(filterType==="income"&&t.type!=="Income")return false;
    if(filterType==="savings"&&t.type!=="Savings")return false;
    if(filterType==="uncategorized"&&(t.category!=="Uncategorized"||t.type==="Non-Transactional"))return false;
    if(search&&t.description.toLowerCase().indexOf(search)===-1&&t.category.toLowerCase().indexOf(search)===-1&&t.date.indexOf(search)===-1)return false;
    return true;
  });

  // Sort by date descending
  txns=txns.slice().sort(function(a,b){
    var pa=a.date.split("/"),pb=b.date.split("/");
    var da=new Date(pa[2],pa[1]-1,pa[0]),db=new Date(pb[2],pb[1]-1,pb[0]);
    return db-da;
  });

  var total=txns.length;
  var start=txnState.page*txnState.pageSize;
  var paged=txns.slice(start,start+txnState.pageSize);
  var totalPages=Math.ceil(total/txnState.pageSize);

  var uncatCount=uncategorized().length;

  var html='<div class="head fi"><h1>Transactions</h1><div style="font-size:12px;color:var(--dim)">'+total+' of '+all.length+'</div></div>';

  html+=acctSelector();

  // Search bar
  html+='<input class="txn-search fi" type="text" placeholder="Search by description, category, or date..." value="'+escHtml(txnState.search)+'" id="txnSearch">';

  // Filter tabs
  html+='<div class="txn-filter-bar fi">';
  var filters=[
    {key:"all",label:"All ("+all.length+")"},
    {key:"expense",label:"Expenses ("+all.filter(function(t){return t.type==="Expense"}).length+")"},
    {key:"income",label:"Income ("+all.filter(function(t){return t.type==="Income"}).length+")"},
    {key:"savings",label:"Savings ("+all.filter(function(t){return t.type==="Savings"}).length+")"}
  ];
  if(uncatCount>0)filters.push({key:"uncategorized",label:"Uncategorized ("+uncatCount+")"});
  filters.forEach(function(ft){
    html+='<div class="txn-filter'+(txnState.filter===ft.key?" on":"")+'" data-tf="'+ft.key+'">'+ft.label+'</div>';
  });
  html+='</div>';

  // Uncategorized banner
  if(uncatCount>0&&txnState.filter!=="uncategorized"){
    html+='<div class="uncat-banner fi" onclick="openUncatWizard()" style="margin-bottom:14px"><h3>'+uncatCount+' uncategorized</h3><p>Tap to batch categorize for better insights</p></div>';
  }

  // Transaction list
  if(paged.length===0){
    html+='<div style="text-align:center;padding:40px 0;color:var(--dim)">No transactions match your filters</div>';
  }else{
    var typeIcons={Expense:"&#8595;",Income:"&#8593;",Savings:"&#9733;","Non-Transactional":"&#8644;"};
    var typeColors={Expense:"var(--rbg)",Income:"var(--gbg)",Savings:"var(--pbg)","Non-Transactional":"rgba(100,116,139,.1)"};
    var typeTextColors={Expense:"var(--red)",Income:"var(--green)",Savings:"var(--purple)","Non-Transactional":"var(--dim)"};
    paged.forEach(function(t,idx){
      var amtColor=t.type==="Income"||t.type==="Cash In"?"var(--green)":t.type==="Savings"?"var(--purple)":t.type==="Non-Transactional"?"var(--dim)":"var(--red)";
      var amtPrefix=t.type==="Income"||t.type==="Cash In"?"+":t.type==="Non-Transactional"?"":"-";
      html+='<div class="txn-list-item fi" style="animation-delay:'+(Math.min(idx,20)*0.02)+'s" data-txn-id="'+t.id+'">'+
        '<div class="txn-icon" style="background:'+typeColors[t.type]+';color:'+typeTextColors[t.type]+'">'+typeIcons[t.type]+'</div>'+
        '<div class="txn-details">'+
          '<div class="txn-desc-line">'+escHtml(t.description)+'</div>'+
          '<div class="txn-meta-line">'+
            '<span style="padding:2px 7px;border-radius:5px;background:'+(t.category==="Uncategorized"?"var(--abg)":"var(--s2)")+';color:'+(t.category==="Uncategorized"?"var(--amber)":"var(--dim)")+';font-weight:'+(t.category==="Uncategorized"?"600":"400")+'">'+t.category+'</span>'+
            '<span>'+t.date+'</span>'+
          '</div>'+
        '</div>'+
        '<div class="txn-amount" style="color:'+amtColor+'">'+
          '<div>'+amtPrefix+f(t.absAmount)+'</div>'+
          (t.balance!=null?'<div class="txn-bal">Bal: '+f(t.balance)+'</div>':'')+
        '</div>'+
      '</div>';
    });
  }

  // Pagination
  if(totalPages>1){
    html+='<div style="display:flex;justify-content:center;align-items:center;gap:12px;padding:16px 0">';
    html+='<div class="txn-filter'+(txnState.page>0?'':'" style="opacity:.3;pointer-events:none')+'" id="txnPrev">&#8592; Prev</div>';
    html+='<span style="font-size:12px;color:var(--muted)">Page '+(txnState.page+1)+' of '+totalPages+'</span>';
    html+='<div class="txn-filter'+(txnState.page<totalPages-1?'':'" style="opacity:.3;pointer-events:none')+'" id="txnNext">Next &#8594;</div>';
    html+='</div>';
  }

  return html;
}

    html+='<div class="row"><div class="dot" style="background:'+cc(c.name)+'"></div><div style="flex:1"><div style="display:flex;justify-content:space-between"><span class="rname">'+c.name+'</span><span class="ramt">'+f(c.total)+'</span></div><div class="rbar"><span style="width:'+c.percentage+'%;background:'+cc(c.name)+'"></span></div><div style="font-size:10px;color:var(--dim);margin-top:2px">'+c.count+' transaction'+(c.count!==1?"s":"")+" &middot; "+c.percentage+'%</div></div></div>';
  }
  html+='</div>';

  // Transaction type distribution (pie chart)
  var typeStats={};
  D.transactions.forEach(function(t){
    if(!typeStats[t.type])typeStats[t.type]={count:0,total:0};
    typeStats[t.type].count++;
    typeStats[t.type].total+=t.absAmount;
  });
  html+='<div class="sec fi" style="animation-delay:.25s"><div class="ccard"><h3>Transaction Distribution</h3>'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px">';
  Object.keys(typeStats).forEach(function(type){
    var s=typeStats[type];
    var typeColor=type==="Income"?"var(--green)":type==="Savings"?"var(--purple)":"var(--red)";
    var pct=D.transactions.length>0?Math.round(s.count/D.transactions.length*100):0;
    html+='<div style="flex:1;min-width:100px;text-align:center;padding:12px;background:var(--s1);border-radius:12px;border:1px solid var(--border)">'+
      '<div style="font-size:24px;font-weight:800;color:'+typeColor+'">'+s.count+'</div>'+
      '<div style="font-size:10px;color:var(--dim);margin-top:2px">'+type+' ('+pct+'%)</div>'+
      '<div style="font-size:12px;font-weight:600;margin-top:4px">'+f(s.total)+'</div>'+
    '</div>';
  });
  html+='</div></div></div>';

  return html;
}

    '<div class="k '+(ti>0&&ts/ti>0.8?"r":"g")+'"><div class="l">Spend Ratio</div><div class="v">'+(ti>0?Math.round(ts/ti*100):0)+'%</div><div class="sub">of income</div></div>'+
  '</div>';

  html+='<div class="sec fi" style="animation-delay:.05s"><div class="ccard"><h3>Spending by category</h3><div class="cwrap"><canvas id="ch2"></canvas></div></div></div>';

  // Detailed category list with transaction counts
  html+='<div class="sec fi" style="animation-delay:.15s"><div class="stitle">All Categories Detail</div>';

      '<div class="rbar"><span style="width:'+c.percentage+'%;background:'+cc(c.name)+'"></span></div>'+
      '<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:10px;color:var(--dim)">'+c.count+' transactions &middot; '+c.percentage+'%</span><span style="font-size:10px;color:var(--dim)">avg '+f(avgPerTxn)+'/txn</span></div>'+

function healthScore(income,expenses,savings){
  if(income===0)return 30;
  var spendRatio=expenses/income;
  var saveRatio=savings/income;
  var score=100;
  if(spendRatio>1)score-=40;
  else if(spendRatio>0.9)score-=30;
  else if(spendRatio>0.8)score-=15;
  else if(spendRatio>0.7)score-=5;
  if(saveRatio<0.05)score-=15;
  else if(saveRatio<0.1)score-=10;
  else if(saveRatio>0.2)score+=5;
  return Math.max(10,Math.min(100,Math.round(score)));
}

function healthColor(i,e,s){
  var sc=healthScore(i,e,s);
  if(sc>=75)return"var(--green)";
  if(sc>=50)return"var(--amber)";
  return"var(--red)";
}

function healthLabel(i,e,s){
  var sc=healthScore(i,e,s);
  if(sc>=80)return"Excellent";
  if(sc>=65)return"Good";
  if(sc>=50)return"Needs Attention";
  if(sc>=35)return"Concerning";
  return"Critical";
}
