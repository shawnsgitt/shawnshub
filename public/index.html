<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1a">
<title>Finance Hub</title>
<link rel="manifest" href="/manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--s1:#111827;--s2:#1a2235;--card:#1e293b;--border:#2d3a52;--text:#f1f5f9;--muted:#94a3b8;--dim:#64748b;--green:#22c55e;--gbg:rgba(34,197,94,.1);--red:#ef4444;--rbg:rgba(239,68,68,.1);--purple:#a855f7;--pbg:rgba(168,85,247,.1);--amber:#f59e0b;--abg:rgba(245,158,11,.1);--blue:#3b82f6;--teal:#14b8a6;--coral:#f97316;--pink:#ec4899;--cyan:#06b6d4}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:0 0 88px;overflow-x:hidden}
.wrap{max-width:600px;margin:0 auto;padding:0 16px}
.head{padding:max(env(safe-area-inset-top),16px) 0 12px;display:flex;align-items:center;justify-content:space-between}
.head h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes sp{to{transform:rotate(360deg)}}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.k{border-radius:14px;padding:14px 16px;border:1px solid var(--border)}
.k .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.k .v{font-size:24px;font-weight:700;letter-spacing:-.5px}
.k .sub{font-size:11px;margin-top:3px;color:var(--muted)}
.k.g{background:var(--gbg);border-color:rgba(34,197,94,.15)}.k.g .v{color:var(--green)}
.k.r{background:var(--rbg);border-color:rgba(239,68,68,.15)}.k.r .v{color:var(--red)}
.k.p{background:var(--pbg);border-color:rgba(168,85,247,.15)}.k.p .v{color:var(--purple)}
.k.a{background:var(--abg);border-color:rgba(245,158,11,.15)}.k.a .v{color:var(--amber)}
.k.b{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.15)}.k.b .v{color:var(--blue)}
.sec{margin-bottom:22px}
.stitle{font-size:13px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.ccard{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.ccard h3{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:500}
.cwrap{position:relative;height:220px}
.row{display:flex;align-items:center;gap:10px;background:var(--s1);border-radius:12px;padding:11px 14px;margin-bottom:6px;cursor:default}
.row.clickable{cursor:pointer}
.row.clickable:active{background:var(--s2)}
.dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.rname{flex:1;font-size:13px;font-weight:500}
.ramt{font-size:13px;font-weight:700}
.rbar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:5px}
.rbar span{display:block;height:4px;border-radius:2px;transition:width .8s ease}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(17,24,39,.85);border-top:1px solid var(--border);display:flex;justify-content:center;gap:20px;padding:10px 0 max(env(safe-area-inset-bottom),10px);z-index:10;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--dim);font-size:10px;font-weight:500;cursor:pointer;transition:color .15s;-webkit-tap-highlight-color:transparent}
.ni.on{color:var(--purple)}
.ni svg{width:20px;height:20px}
.fi{animation:fi .35s ease both;opacity:0}
@keyframes fi{to{opacity:1}}

.upload-zone{border:2px dashed var(--border);border-radius:16px;padding:40px 20px;text-align:center;transition:border-color .2s,background .2s;cursor:pointer;margin-bottom:16px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--purple);background:var(--pbg)}
.upload-zone svg{width:48px;height:48px;color:var(--dim);margin-bottom:12px}
.upload-zone p{color:var(--muted);font-size:14px;margin-bottom:4px}
.upload-zone .hint{font-size:11px;color:var(--dim)}
.upload-zone input{display:none}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:88px;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s ease}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 24px;width:100%;max-width:540px;max-height:70vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:6px}
.modal .modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.modal .cat-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .1s}
.modal .cat-opt:active{background:var(--s2)}
.modal .cat-opt .dot{width:12px;height:12px}
.modal .cat-opt span{font-size:14px}
.modal-close{margin-top:16px;width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:14px;font-weight:600;cursor:pointer}

/* Batch categorization wizard */
.batch-modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 24px;width:100%;max-width:600px;max-height:85vh;display:flex;flex-direction:column}
.batch-header{flex-shrink:0;margin-bottom:12px}
.batch-header h3{font-size:18px;font-weight:700;margin-bottom:4px}
.batch-header .batch-stats{font-size:12px;color:var(--muted)}
.batch-search{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:13px;margin-bottom:12px;outline:none;flex-shrink:0}
.batch-search:focus{border-color:var(--purple)}
.batch-search::placeholder{color:var(--dim)}
.batch-tabs{display:flex;gap:6px;margin-bottom:12px;flex-shrink:0;overflow-x:auto;padding-bottom:4px}
.batch-tab{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--s1);color:var(--dim);border:1px solid var(--border);transition:all .15s}
.batch-tab.on{background:var(--pbg);color:var(--purple);border-color:rgba(168,85,247,.3)}
.batch-body{flex:1;overflow-y:auto;margin-bottom:12px}
.group-card{background:var(--s1);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);transition:border-color .15s}
.group-card.selected{border-color:var(--purple)}
.group-top{display:flex;align-items:center;gap:10px;cursor:pointer}
.group-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:12px;color:transparent}
.group-check.on{background:var(--purple);border-color:var(--purple);color:#fff}
.group-info{flex:1;min-width:0}
.group-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.group-meta{font-size:11px;color:var(--dim);margin-top:2px}
.group-amt{font-size:14px;font-weight:700;color:var(--red);flex-shrink:0}
.group-expand{cursor:pointer;padding:4px;color:var(--dim);font-size:11px;transition:color .15s}
.group-expand:hover{color:var(--text)}
.group-txns{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.group-txn{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:11px;color:var(--muted)}
.group-txn .txn-desc{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.batch-actions{flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.batch-apply-bar{display:flex;gap:8px;align-items:center}
.batch-cat-select{flex:1;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:13px;font-weight:600;appearance:none;cursor:pointer;outline:none}
.batch-apply-btn{padding:12px 20px;border-radius:12px;border:none;background:var(--purple);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.batch-apply-btn:disabled{opacity:.4;cursor:not-allowed}
.batch-apply-btn:not(:disabled):active{opacity:.8}
.batch-done-btn{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:14px;font-weight:600;cursor:pointer}
.select-all-row{display:flex;align-items:center;gap:8px;padding:8px 0;margin-bottom:8px;cursor:pointer;flex-shrink:0}
.select-all-row span{font-size:12px;font-weight:600;color:var(--muted)}

.toast{position:fixed;top:max(env(safe-area-inset-top),16px);left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;animation:fi .3s ease;pointer-events:none}
.toast.err{background:var(--red)}

.badge{font-size:9px;padding:3px 7px;border-radius:5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge.inc{background:var(--gbg);color:var(--green)}
.badge.exp{background:var(--rbg);color:var(--red)}
.badge.sav{background:var(--pbg);color:var(--purple)}

.rec-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.rec-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.rec-icon.critical{background:var(--rbg);color:var(--red)}
.rec-icon.warning{background:var(--abg);color:var(--amber)}
.rec-icon.suggestion{background:rgba(59,130,246,.1);color:var(--blue)}
.rec-icon.positive{background:var(--gbg);color:var(--green)}
.rec-icon.info{background:rgba(6,182,212,.1);color:var(--cyan)}
.rec-body h4{font-size:14px;font-weight:600;margin-bottom:4px}
.rec-body p{font-size:12px;color:var(--muted);line-height:1.5}

.uncat-banner{background:var(--abg);border:1px solid rgba(245,158,11,.3);border-radius:14px;padding:16px;margin-bottom:16px;cursor:pointer;transition:background .2s}
.uncat-banner:active{background:rgba(245,158,11,.15)}
.uncat-banner h3{font-size:14px;color:var(--amber);font-weight:600;margin-bottom:4px}
.uncat-banner p{font-size:12px;color:var(--muted)}

.progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;margin:8px 0;overflow:hidden}
.progress-bar span{display:block;height:100%;border-radius:3px;transition:width .5s ease}

.clear-btn{padding:8px 14px;border-radius:10px;border:1px solid rgba(239,68,68,.3);background:var(--rbg);color:var(--red);font-size:11px;font-weight:600;cursor:pointer}
.clear-btn:active{opacity:.7}

.empty{text-align:center;padding:60px 20px}
.empty svg{width:56px;height:56px;color:var(--dim);margin-bottom:16px}
.empty h2{font-size:18px;margin-bottom:8px;font-weight:700}
.empty p{color:var(--muted);font-size:13px;line-height:1.5}

/* Hub sections */
.hub-menu{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.hub-item{background:var(--card);border-radius:14px;padding:18px 16px;border:1px solid var(--border);cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:12px}
.hub-item:active{background:var(--s2);border-color:var(--purple)}
.hub-item .hi-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hub-item .hi-info{flex:1;min-width:0}
.hub-item .hi-name{font-size:13px;font-weight:600}
.hub-item .hi-sub{font-size:10px;color:var(--dim);margin-top:2px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--purple);cursor:pointer;margin-bottom:12px;padding:6px 0}
.back-btn:active{opacity:.7}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.form-input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:13px;outline:none}
.form-input:focus{border-color:var(--purple)}
.form-select{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:13px;outline:none;appearance:none;cursor:pointer}
.form-select:focus{border-color:var(--purple)}
.btn-primary{width:100%;padding:13px;border-radius:12px;border:none;background:var(--purple);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-primary:active{opacity:.8}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-sm:active{opacity:.8}
.btn-danger{background:var(--rbg);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-edit{background:var(--pbg);color:var(--purple);border:1px solid rgba(168,85,247,.3)}
.item-card{background:var(--s1);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.item-card .item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.item-card .item-name{font-size:14px;font-weight:600}
.item-card .item-detail{font-size:11px;color:var(--muted);margin-bottom:4px}
.item-card .item-actions{display:flex;gap:6px;margin-top:8px}
.status-pill{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600}
.status-pill.paid{background:var(--gbg);color:var(--green)}
.status-pill.pending{background:var(--abg);color:var(--amber)}
.status-pill.overdue{background:var(--rbg);color:var(--red)}
.goal-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:10px}
.goal-card .goal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.goal-card .goal-name{font-size:14px;font-weight:600}
.goal-card .goal-amounts{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.summary-stat{background:var(--s1);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)}
.summary-stat .ss-val{font-size:20px;font-weight:700;letter-spacing:-.3px}
.summary-stat .ss-label{font-size:10px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

@media(min-width:600px){.kgrid{grid-template-columns:repeat(4,1fr)}.cwrap{height:240px}}

.flow-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;margin-bottom:8px}
.flow-bar>div{transition:width .8s ease}
.flow-legend{display:flex;gap:12px;flex-wrap:wrap}
.flow-legend span{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block}
.top-cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.top-cat{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);text-align:center}
.top-cat .rank{font-size:12px;font-weight:800;color:var(--purple);margin-bottom:4px}
.top-cat .cat-name{font-size:12px;font-weight:600;margin:4px 0}
.top-cat .cat-amt{font-size:18px;font-weight:700}
.acct-sel{margin-bottom:16px;display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.acct-pill{padding:7px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--s1);color:var(--dim);border:1px solid var(--border);transition:all .15s}
.acct-pill.on{background:var(--pbg);color:var(--purple);border-color:rgba(168,85,247,.3)}
.txn-list-item{display:flex;align-items:center;gap:10px;background:var(--s1);border-radius:12px;padding:12px 14px;margin-bottom:6px;border:1px solid transparent;transition:border-color .15s}
.txn-list-item:active{border-color:var(--border)}
.txn-list-item .txn-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.txn-list-item .txn-details{flex:1;min-width:0}
.txn-list-item .txn-desc-line{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-list-item .txn-meta-line{font-size:10px;color:var(--dim);margin-top:3px;display:flex;align-items:center;gap:6px}
.txn-list-item .txn-amount{font-size:14px;font-weight:700;flex-shrink:0;text-align:right}
.txn-list-item .txn-amount .txn-bal{font-size:10px;color:var(--dim);font-weight:400;margin-top:2px}
.txn-filter-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.txn-filter{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--s1);color:var(--dim);border:1px solid var(--border);transition:all .15s}
.txn-filter.on{background:var(--pbg);color:var(--purple);border-color:rgba(168,85,247,.3)}
.txn-search{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:13px;margin-bottom:12px;outline:none}
.txn-search:focus{border-color:var(--purple)}
.txn-search::placeholder{color:var(--dim)}

.snap-hero{text-align:center;padding:24px 0 20px}
.snap-hero .nw-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.snap-hero .nw-val{font-size:40px;font-weight:800;letter-spacing:-1px}
.snap-hero .nw-sub{font-size:12px;color:var(--dim);margin-top:4px}
.snap-row{display:flex;gap:10px;margin-bottom:10px}
.snap-card{flex:1;border-radius:14px;padding:16px;border:1px solid var(--border);background:var(--card)}
.snap-card .sc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.snap-card .sc-val{font-size:22px;font-weight:700;letter-spacing:-.3px}
.snap-card .sc-sub{font-size:10px;color:var(--dim);margin-top:4px}
.snap-card.green .sc-val{color:var(--green)}
.snap-card.red .sc-val{color:var(--red)}
.snap-card.purple .sc-val{color:var(--purple)}
.snap-card.amber .sc-val{color:var(--amber)}
.snap-card.blue .sc-val{color:var(--blue)}
.snap-divider{height:1px;background:var(--border);margin:18px 0}
.snap-section-title{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<nav>
<div class="ni on" data-v="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></div>
<div class="ni" data-v="upload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>Upload</span></div>
<div class="ni" data-v="overview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span>Overview</span></div>
<div class="ni" data-v="transactions"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>Transactions</span></div>
<div class="ni" data-v="more"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>More</span></div>
</nav>

<script>
var CATS=["Groceries","Eating Out","Transport","Shopping","Subscriptions","Bills & Utilities","Health & Fitness","Entertainment","Education","Personal Care","Cash Transfer","Income","Savings","Cash Withdrawal","Cash In","Bank Fees","Balance Carried Forward","Uncategorized"];
var CC={"Groceries":"#22c55e","Transport":"#3b82f6","Eating Out":"#ef4444","Bills & Utilities":"#8b5cf6","Shopping":"#ec4899","Subscriptions":"#06b6d4","Education":"#6366f1","Health & Fitness":"#14b8a6","Entertainment":"#f59e0b","Personal Care":"#f472b6","Income":"#22c55e","Savings":"#a855f7","Cash Withdrawal":"#78716c","Cash In":"#059669","Cash Transfer":"#475569","Bank Fees":"#dc2626","Balance Carried Forward":"#334155","Uncategorized":"#64748b","Pending Review":"#f59e0b"};
function cc(n){return CC[n]||"#64748b"}
function f(n){if(n==null||isNaN(n))return"£0";return"£"+Math.abs(Math.round(n)).toLocaleString("en-GB")}
function txAmt(t){return t.absAmount||Math.abs(t.amount||0)||0}

var D=null,charts={},cv="home",selAcct="all",selMonth=null;
var hubSection=null; // tracks which "more" sub-section is active
var hubCache={}; // in-memory cache of hub data loaded from API
var hubForms={}; // tracks form states

document.querySelectorAll(".ni").forEach(function(el){
  el.addEventListener("click",function(){
    cv=el.dataset.v;
    if(cv!=="more")hubSection=null;
    document.querySelectorAll(".ni").forEach(function(e){e.classList.toggle("on",e.dataset.v===cv)});
    // Close any open modal when navigating
    var openModal=document.querySelector(".modal-bg");
    if(openModal){openModal.remove();recalcAnalysis();}
    destroyCharts();render();
  });
});

function destroyCharts(){Object.values(charts).forEach(function(c){c.destroy()});charts={}}

function toast(msg,isErr){
  var t=document.createElement("div");
  t.className="toast"+(isErr?" err":"");
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove()},2500);
}

function hasData(){return D&&D.transactions&&D.transactions.length>0}

function buildAccounts(){
  if(!D||!D.transactions)return;
  D.accounts={};
  D.transactions.forEach(function(t){
    var acct=t.account||"Account";
    if(!D.accounts[acct])D.accounts[acct]=[];
    D.accounts[acct].push(t);
  });
}

function accounts(){
  if(!D||!D.accounts)return[];
  return Object.keys(D.accounts);
}

function filtered(){
  if(!D||!D.transactions)return[];
  var base=selAcct==="all"?D.transactions:(D.accounts[selAcct]||[]);
  return base.filter(function(t){return !t.account||t.account.toLowerCase().indexOf("remittance")===-1});
}

function acctSelector(){
  if(!hasData())return"";
  var accts=accounts().filter(function(a){return a.toLowerCase().indexOf("remittance")===-1});
  if(accts.length<=1)return"";
  var html='<div class="acct-sel fi">';
  html+='<div class="acct-pill'+(selAcct==="all"?" on":"")+'" data-acct="all">All Accounts</div>';
  accts.forEach(function(a){
    html+='<div class="acct-pill'+(selAcct===a?" on":"")+'" data-acct="'+escHtml(a)+'">'+escHtml(a)+'</div>';
  });
  html+='</div>';
  return html;
}

function bindAcctSelector(){
  document.querySelectorAll(".acct-pill").forEach(function(pill){
    pill.addEventListener("click",function(){
      selAcct=pill.dataset.acct;
      selMonth=null;
      destroyCharts();render();
    });
  });
}

function bindMonthSelector(){
  document.querySelectorAll(".month-pill").forEach(function(pill){
    pill.addEventListener("click",function(){
      var parts=pill.dataset.my.split("-");
      var m=parseInt(parts[0],10),y=parseInt(parts[1],10);
      if(selMonth&&selMonth.m===m&&selMonth.y===y){selMonth=null;}
      else{selMonth={m:m,y:y};}
      destroyCharts();render();
    });
  });
}

function expenses(){return filtered().filter(function(t){var et=t.type;if(t.category==="Pending Review"&&t.suggestedType)et=t.suggestedType;return et==="Expense"})}
function income(){return filtered().filter(function(t){var et=t.type;if(t.category==="Pending Review"&&t.suggestedType)et=t.suggestedType;return et==="Income"})}
function savings(){return filtered().filter(function(t){var et=t.type;if(t.category==="Pending Review"&&t.suggestedType)et=t.suggestedType;return et==="Savings"})}
function uncategorized(){return D?D.transactions.filter(function(t){return (t.category==="Uncategorized"||t.category==="Pending Review")&&t.type!=="Non-Transactional"}):[]}
function tot(a){return a.reduce(function(s,r){return s+txAmt(r)},0)}

function render(){
  var a=document.getElementById("app");
  destroyCharts();
  if(cv==="home")a.innerHTML=homeView();
  else if(cv==="upload")a.innerHTML=uploadView();
  else if(cv==="overview")a.innerHTML=dashboardView();
  else if(cv==="transactions")a.innerHTML=txnView();
  else if(cv==="more")a.innerHTML=moreView();
  initCharts();
  bindUpload();
  bindUncatClicks();
  bindAcctSelector();
  bindMonthSelector();
  bindTxnEvents();
  bindHubEvents();
}

// ───────── HOME / FINANCIAL SNAPSHOT ─────────
function latestBalance(acctName){
  var txns=D.accounts[acctName];
  if(!txns||!txns.length)return 0;
  var sorted=txns.slice().sort(function(a,b){
    if(a.date>b.date)return 1;if(a.date<b.date)return -1;return 0;
  });
  for(var i=sorted.length-1;i>=0;i--){
    if(sorted[i].balance!=null&&!isNaN(sorted[i].balance))return sorted[i].balance;
  }
  return 0;
}

function isDebtAccount(name){
  var n=name.toLowerCase();
  return n.indexOf("credit")!==-1||n.indexOf("card")!==-1||n.indexOf("loan")!==-1||n.indexOf("debt")!==-1||n.indexOf("overdraft")!==-1;
}

function latestMonth(){
  if(selMonth)return selMonth;
  var all=filtered();
  if(!all.length){var now=new Date();return{y:now.getFullYear(),m:now.getMonth()+1};}
  var dates=all.filter(function(t){return !t.dateUnreadable&&t.date!=="UNREADABLE"}).map(function(t){
    var p=t.date.split("/");
    return{y:parseInt(p[2],10),m:parseInt(p[1],10)};
  }).filter(function(d){return !isNaN(d.y)&&!isNaN(d.m)});
  if(!dates.length){var now2=new Date();return{y:now2.getFullYear(),m:now2.getMonth()+1};}
  dates.sort(function(a,b){return b.y-a.y||b.m-a.m});
  return dates[0];
}

function availableMonths(){
  var all=filtered();
  if(!all.length)return[];
  var map={};
  all.filter(function(t){return !t.dateUnreadable&&t.date!=="UNREADABLE"}).forEach(function(t){
    var p=t.date.split("/");
    var y=parseInt(p[2],10),m=parseInt(p[1],10);
    if(!isNaN(y)&&!isNaN(m)){var k=y*100+m;map[k]={y:y,m:m};}
  });
  var months=Object.keys(map).map(function(k){return map[k]});
  months.sort(function(a,b){return b.y-a.y||b.m-a.m});
  return months;
}

function monthSelector(){
  var months=availableMonths();
  if(months.length<=1)return"";
  var lm=latestMonth();
  var html='<div class="month-sel fi" style="display:flex;gap:6px;flex-wrap:wrap;padding:0 4px;margin-bottom:12px">';
  months.forEach(function(mo){
    var isOn=lm&&lm.y===mo.y&&lm.m===mo.m;
    html+='<div class="month-pill'+(isOn?" on":"")+'" data-my="'+mo.m+'-'+mo.y+'" style="padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:'+(isOn?'var(--purple)':'var(--muted)')+';background:'+(isOn?'rgba(168,85,247,.1)':'transparent')+'">'+monthName(mo.m)+' '+mo.y+'</div>';
  });
  html+='</div>';
  return html;
}

function monthlyTxns(){
  var lm=latestMonth();
  if(!lm)return[];
  return filtered().filter(function(t){
    if(t.dateUnreadable||t.date==="UNREADABLE")return false;
    var p=t.date.split("/");
    return parseInt(p[1],10)===lm.m&&parseInt(p[2],10)===lm.y;
  });
}

function monthName(m){
  var names=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return names[m]||"";
}

function homeView(){
  if(!hasData())return'<div class="head fi"><h1>Finance Hub</h1><div class="live"></div></div>'+
    '<div class="empty fi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'+
    '<h2>Welcome to Finance Hub</h2>'+
    '<p>Upload a bank statement to see your full financial snapshot — income, spending breakdown by category, recent transactions with dates, and account balances.</p>'+
    '<div style="margin-top:16px"><span style="display:inline-block;padding:12px 24px;border-radius:12px;background:var(--purple);color:#fff;font-size:14px;font-weight:600;cursor:pointer" onclick="cv=\'upload\';document.querySelectorAll(\'.ni\').forEach(function(e){e.classList.toggle(\'on\',e.dataset.v===\'upload\')});destroyCharts();render()">Upload Statement</span></div>'+
    '</div>';
  var accts=accounts();
  var cashTotal=0,debtTotal=0;
  accts.forEach(function(a){
    var bal=latestBalance(a);
    if(isDebtAccount(a)){
      debtTotal+=Math.abs(bal);
    }else{
      cashTotal+=bal;
    }
  });
  var netWorth=cashTotal-debtTotal;
  var hasBalanceData=!(netWorth===0&&cashTotal===0&&debtTotal===0&&D.transactions.length>0);
  // Also consider opening/closing balance from parseStats (detected from OPENING/CLOSING rows)
  var psOpenBal=(D.parseStats&&D.parseStats.openingBalance!=null)?D.parseStats.openingBalance:null;
  var psCloseBal=(D.parseStats&&D.parseStats.closingBalance!=null)?D.parseStats.closingBalance:null;
  if(!hasBalanceData&&(psOpenBal!=null||psCloseBal!=null))hasBalanceData=true;
  // If we have closing balance from parseStats but no running balance in transactions, use it for net worth
  if(netWorth===0&&cashTotal===0&&psCloseBal!=null){netWorth=psCloseBal;cashTotal=psCloseBal;}
  var nwHint="";
  if(!hasBalanceData){
    nwHint='<div class="nw-sub" style="margin-top:4px;font-size:11px;color:var(--amber)">Transactions were imported successfully, but no balance columns were detected in your statement. Upload a file that includes a running balance column to enable net worth tracking.</div>';
  }

  var mt=monthlyTxns();
  var mIncome=0,mSpending=0;
  var mPending=0,mNonTxn=0,mConfirmed=0;
  mt.forEach(function(t){
    var effectiveType=t.type;
    if(t.category==="Pending Review"&&t.suggestedType)effectiveType=t.suggestedType;
    if(t.category==="Pending Review"&&!t.suggestedType)mPending++;
    if(t.confirmed)mConfirmed++;
    if(effectiveType==="Non-Transactional"){mNonTxn++;return;}
    if(effectiveType==="Income")mIncome+=txAmt(t);
    else if(effectiveType==="Expense")mSpending+=txAmt(t);
  });
  var leftAfter=mIncome-mSpending;
  var totalPending=pendingReview().length;
  var totalConfirmed=D.transactions.filter(function(t){return t.confirmed===true}).length;
  var unreadableDateCount=D.transactions.filter(function(t){return t.dateUnreadable||t.date==="UNREADABLE"}).length;
  var zeroHint="";
  if(mt.length>0&&mIncome===0&&mSpending===0){
    if(mPending>0)zeroHint='<div class="snap-hint fi" style="animation-delay:.13s;font-size:12px;color:var(--amber);padding:0 20px;text-align:center">'+mPending+' transaction'+(mPending!==1?'s':'')+' still pending review &mdash; review and confirm categories so totals can be calculated</div>';
    else if(mNonTxn===mt.length)zeroHint='<div class="snap-hint fi" style="animation-delay:.13s;font-size:12px;color:var(--dim);padding:0 20px;text-align:center">All '+mt.length+' transaction'+(mt.length!==1?'s':'')+' this month are non-transactional (e.g. balance carried forward) &mdash; only income and expense transactions count toward totals</div>';
    else zeroHint='<div class="snap-hint fi" style="animation-delay:.13s;font-size:12px;color:var(--dim);padding:0 20px;text-align:center">Transactions found but none categorised as income or expense yet &mdash; assign categories to see monthly totals</div>';
  } else if(mt.length===0){
    var allTxns=filtered().filter(function(t){return !t.dateUnreadable&&t.date!=="UNREADABLE"});
    var dateRange="";
    if(allTxns.length>0){
      var allDates=allTxns.map(function(t){var p=t.date.split("/");return{d:parseInt(p[0],10),m:parseInt(p[1],10),y:parseInt(p[2],10)};}).filter(function(d){return !isNaN(d.y)});
      if(allDates.length>0){
        allDates.sort(function(a,b){return a.y-b.y||a.m-b.m||a.d-b.d;});
        var earliest=allDates[0];
        var latest=allDates[allDates.length-1];
        dateRange=" Your "+allTxns.length+" transaction"+(allTxns.length!==1?"s":"")+" are from "+monthName(earliest.m)+" "+earliest.y+(earliest.m!==latest.m||earliest.y!==latest.y?" to "+monthName(latest.m)+" "+latest.y:"")+".";
      }
    }
    var unreadableNote=unreadableDateCount>0?" "+unreadableDateCount+" row"+(unreadableDateCount!==1?"s":"")+" had unreadable dates and were excluded.":"";
    zeroHint='<div class="snap-hint fi" style="animation-delay:.13s;font-size:12px;color:var(--amber);padding:0 20px;text-align:center">No transactions found for this month.'+dateRange+unreadableNote+' Try switching to the Overview tab to see all-time data.</div>';
  }
  // Add date parsing failure warning if applicable
  if(unreadableDateCount>0){
    zeroHint+='<div class="snap-hint fi" style="animation-delay:.14s;font-size:12px;color:var(--red);padding:4px 20px;text-align:center">Date parsing failed for '+unreadableDateCount+' row'+(unreadableDateCount!==1?'s':'')+' &mdash; these transactions are excluded from monthly totals. Check the Import Summary above for details.</div>';
  }

  var lm=latestMonth();
  var monthLabel=(lm&&monthName(lm.m)&&!isNaN(lm.y))?monthName(lm.m)+" "+lm.y:"This month";

  return'<div class="head fi"><h1>Finance Hub</h1><div class="live"></div></div>'+
  acctSelector()+
  // ── Import summary card (shows date parsing stats) ──
  (function(){
    if(!D||!D.parseStats)return'';
    var ps=D.parseStats;
    var txnCount=D.transactions.length;
    var validCount=ps.validDates;
    var failedCount=ps.failedDates;
    var totalParsed=validCount+failedCount;
    var lines=[];
    lines.push('<strong>Rows processed:</strong> '+ps.totalRows+(totalParsed!==ps.totalRows?' ('+totalParsed+' had date values)':''));
    lines.push('<strong>Transactions imported:</strong> <span style="color:var(--green)">'+txnCount+'</span>'+(failedCount>0?' &middot; <span style="color:var(--red)">'+failedCount+' row'+(failedCount!==1?'s':'')+' failed date parsing</span>':''));
    if(ps.dateRangeMin&&ps.dateRangeMax){
      var minParts=ps.dateRangeMin.split("-");
      var maxParts=ps.dateRangeMax.split("-");
      var minLabel=minParts[2]+"/"+minParts[1]+"/"+minParts[0];
      var maxLabel=maxParts[2]+"/"+maxParts[1]+"/"+maxParts[0];
      lines.push('<strong>Date range:</strong> '+minLabel+' &rarr; '+maxLabel);
    }
    // Months covered
    var mons=availableMonths();
    if(mons.length>0)lines.push('<strong>Months covered:</strong> '+mons.length+' ('+monthName(mons[mons.length-1].m)+' '+mons[mons.length-1].y+' &ndash; '+monthName(mons[0].m)+' '+mons[0].y+')');
    // Categorisation counts
    var catConfirmed=D.transactions.filter(function(t){return t.confirmed===true}).length;
    var catPending=D.transactions.filter(function(t){return t.confirmed===false&&t.category==="Pending Review"}).length;
    var catUncategorized=D.transactions.filter(function(t){return t.category==="Uncategorized"}).length;
    var catCategorised=D.transactions.filter(function(t){return t.confirmed===true&&t.category!=="Uncategorized"&&t.category!=="Pending Review"}).length;
    lines.push('<strong>Categorised:</strong> <span style="color:var(--green)">'+catCategorised+'</span> &middot; <strong>Pending review:</strong> <span style="color:var(--amber)">'+catPending+'</span>'+(catUncategorized>0?' &middot; <strong>Uncategorised:</strong> <span style="color:var(--dim)">'+catUncategorized+'</span>':''));
    var lmNow=latestMonth();
    if(lmNow)lines.push('<strong>Viewing month:</strong> '+monthName(lmNow.m)+' '+lmNow.y+' ('+monthlyTxns().length+' transaction'+(monthlyTxns().length!==1?'s':'')+')');
    // Date column info
    if(ps.dateColumnsUsed&&ps.dateColumnsUsed.length>0){
      var colInfo=ps.dateColumnsUsed.map(function(c){return '"'+c.column+'" ('+c.type+') in '+c.sheet}).join(', ');
      lines.push('<strong>Date column used:</strong> '+colInfo);
      if(ps.dateColumnsUsed[0].allColumns&&ps.dateColumnsUsed[0].allColumns.length>1){
        lines.push('<strong>Other date columns found:</strong> '+ps.dateColumnsUsed[0].allColumns.slice(1).join(', '));
      }
    }
    if(ps.dateOrder)lines.push('<strong>Date format detected:</strong> '+(ps.dateOrder==="day-first"?"Day-first (DD/MM/YYYY)":"Month-first (MM/DD/YYYY)"));
    // Balance detection results
    if(ps.openingBalance!=null)lines.push('<strong>Opening balance detected:</strong> <span style="color:var(--green)">'+f(ps.openingBalance)+'</span>'+(ps.openingBalanceRow?' <span style="color:var(--dim)">('+ps.openingBalanceRow.description+')</span>':''));
    if(ps.closingBalance!=null)lines.push('<strong>Closing balance detected:</strong> <span style="color:var(--green)">'+f(ps.closingBalance)+'</span>'+(ps.closingBalanceRow?' <span style="color:var(--dim)">('+ps.closingBalanceRow.description+')</span>':''));
    if(ps.openingBalance!=null||ps.closingBalance!=null)lines.push('<strong>Balance source:</strong> '+ps.balanceSource);
    if(ps.balanceRows&&ps.balanceRows.length>0)lines.push('<strong>Balance rows classified:</strong> '+ps.balanceRows.map(function(r){return r.type+' &mdash; "'+r.description+'"'}).join(', '));
    if(ps.summaryTotalsRowDetected){
      var sumLine='<strong>Totals summary row:</strong> <span style="color:var(--dim)">detected</span>';
      if(ps.summaryTotalPaidIn!=null)sumLine+=' &middot; Paid in: '+f(ps.summaryTotalPaidIn);
      if(ps.summaryTotalPaidOut!=null)sumLine+=' &middot; Paid out: '+f(ps.summaryTotalPaidOut);
      lines.push(sumLine);
    }
    // Failed rows detail
    if(failedCount>0&&ps.failedDateRows&&ps.failedDateRows.length>0){
      var examples=ps.failedDateRows.slice(0,5).map(function(r){return 'Row '+r.row+': "'+r.rawValue+'"'+(r.sheet?' ('+r.sheet+')':'')}).join(', ');
      lines.push('<strong>Unreadable date examples:</strong> '+examples);
    }
    return'<div class="fi" style="animation-delay:.02s;background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:14px;font-size:12px;line-height:1.8">'+
      '<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px">Import Summary</div>'+
      lines.join('<br>')+
    '</div>';
  })()+
  (pendingReview().length>0?'<div class="uncat-banner fi" onclick="openReviewWizard()" style="margin-bottom:14px"><h3>'+pendingReview().length+' transactions pending review</h3><p>Tap to review and approve suggested categories</p></div>':'')+
  '<div class="snap-hero fi">'+
    '<div class="nw-label">Net Worth</div>'+
    (hasBalanceData?
    '<div class="nw-val" style="color:'+(netWorth>=0?"var(--green)":"var(--red)")+'">'+(netWorth<0?"-":"")+f(Math.abs(netWorth))+'</div>'+
    '<div class="nw-sub">Cash minus debt</div>'
    :
    '<div class="nw-val" style="color:var(--dim);font-size:28px">&mdash;</div>'+
    '<div class="nw-sub">Balance columns not found in your import</div>'
    )+
    nwHint+
  '</div>'+

  (hasBalanceData?
  '<div class="snap-row fi" style="animation-delay:.05s">'+
    '<div class="snap-card green"><div class="sc-label">Cash on hand</div><div class="sc-val">'+f(cashTotal)+'</div><div class="sc-sub">Across '+accts.filter(function(a){return !isDebtAccount(a)}).length+' account'+(accts.filter(function(a){return !isDebtAccount(a)}).length!==1?'s':'')+'</div></div>'+
    '<div class="snap-card red"><div class="sc-label">Total debt</div><div class="sc-val">'+f(debtTotal)+'</div><div class="sc-sub">'+(debtTotal>0?accts.filter(isDebtAccount).length+' account'+(accts.filter(isDebtAccount).length!==1?'s':''):'No debt accounts')+'</div></div>'+
  '</div>'
  :
  '<div class="snap-row fi" style="animation-delay:.05s">'+
    '<div class="snap-card" style="border-color:var(--border)"><div class="sc-label">Uploaded sources</div><div class="sc-val" style="color:var(--text)">'+accts.filter(function(a){return a.toLowerCase().indexOf("remittance")===-1}).length+'</div><div class="sc-sub">account'+(accts.filter(function(a){return a.toLowerCase().indexOf("remittance")===-1}).length!==1?'s':'')+' &middot; no balance data</div></div>'+
    '<div class="snap-card" style="border-color:var(--border)"><div class="sc-label">Transactions</div><div class="sc-val" style="color:var(--text)">'+D.transactions.length+'</div><div class="sc-sub">uploaded total</div></div>'+
  '</div>'
  )+

  '<div class="snap-divider fi" style="animation-delay:.1s"></div>'+
  '<div class="snap-section-title fi" style="animation-delay:.1s">Monthly breakdown &middot; '+monthLabel+'</div>'+
  monthSelector()+

// ───────── MONTHLY CATEGORY BREAKDOWN (for home page) ─────────
function monthCategoryBreakdownHtml(mt,totalSpending){
  // Build category totals from this month's transactions
  var catMap={};
  mt.forEach(function(t){
    var effectiveType=t.type;
    var effectiveCat=t.category;
    if(t.category==="Pending Review"&&t.suggestedCategory){
      effectiveCat=t.suggestedCategory;
      effectiveType=t.suggestedType||typeForCategory(t.suggestedCategory);
    }
    if(effectiveType!=="Expense")return;
    if(!catMap[effectiveCat])catMap[effectiveCat]={total:0,count:0};
    catMap[effectiveCat].total+=txAmt(t);
    catMap[effectiveCat].count++;
  });
  var cats=Object.entries(catMap).map(function(e){
    return{name:e[0],total:Math.round(e[1].total*100)/100,count:e[1].count,pct:totalSpending>0?Math.round(e[1].total/totalSpending*1000)/10:0};
  }).sort(function(a,b){return b.total-a.total});

  if(cats.length===0)return'';

  var html='<div class="snap-divider fi" style="animation-delay:.18s"></div>'+
    '<div class="snap-section-title fi" style="animation-delay:.19s">Spending by category</div>';

  for(var i=0;i<cats.length;i++){
    var c=cats[i];
    html+='<div class="row fi" style="animation-delay:'+(.2+i*0.02)+'s"><div class="dot" style="background:'+cc(c.name)+'"></div><div style="flex:1">'+
      '<div style="display:flex;justify-content:space-between;align-items:center"><span class="rname">'+c.name+'</span><span class="ramt" style="color:'+cc(c.name)+'">'+f(c.total)+'</span></div>'+
      '<div class="rbar"><span style="width:'+c.pct+'%;background:'+cc(c.name)+'"></span></div>'+
      '<div style="font-size:10px;color:var(--dim);margin-top:2px">'+c.count+' transaction'+(c.count!==1?'s':'')+' &middot; '+c.pct+'%</div>'+
    '</div></div>';
  }
  return html;
}

// ───────── RECENT TRANSACTIONS WITH DATES (for home page) ─────────
function formatDateLabel(dateStr){
  // dateStr is DD/MM/YYYY — convert to a friendly label
  var p=dateStr.split("/");
  if(p.length<3)return dateStr;
  var d=parseInt(p[0],10),m=parseInt(p[1],10),y=parseInt(p[2],10);
  var dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var monthNames=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var dt=new Date(y,m-1,d);
  return dayNames[dt.getDay()]+', '+d+' '+monthNames[m]+' '+y;
}

function recentTransactionsHtml(mt){
  if(!mt||mt.length===0)return'';

  // Sort by date descending, then by original order
  var sorted=mt.slice().sort(function(a,b){
    var pa=a.date.split("/"),pb=b.date.split("/");
    var da=new Date(pa[2],pa[1]-1,pa[0]),db=new Date(pb[2],pb[1]-1,pb[0]);
    return db-da;
  });

  // Group by date
  var groups=[];
  var currentDate='';
  sorted.forEach(function(t){
    if(t.date!==currentDate){
      currentDate=t.date;
      groups.push({date:t.date,label:formatDateLabel(t.date),txns:[]});
    }
    groups[groups.length-1].txns.push(t);
  });

  // Show up to 15 transactions across date groups
  var html='<div class="snap-divider fi" style="animation-delay:.35s"></div>'+
    '<div class="snap-section-title fi" style="animation-delay:.36s">Recent transactions</div>';

  var shown=0;
  var maxShow=15;
  for(var g=0;g<groups.length&&shown<maxShow;g++){
    var grp=groups[g];
    // Date group header
    var dayTotal=0;
    grp.txns.forEach(function(t){
      var et=t.type;
      if(t.category==="Pending Review"&&t.suggestedType)et=t.suggestedType;
      if(et==="Expense")dayTotal+=txAmt(t);
    });
    html+='<div class="fi" style="animation-delay:'+(.37+g*0.02)+'s;display:flex;justify-content:space-between;align-items:center;padding:8px 0 4px">'+
      '<span style="font-size:11px;font-weight:600;color:var(--muted)">'+grp.label+'</span>'+
      (dayTotal>0?'<span style="font-size:11px;color:var(--red);font-weight:600">-'+f(dayTotal)+' spent</span>':'')+
    '</div>';

    for(var ti=0;ti<grp.txns.length&&shown<maxShow;ti++){
      var t=grp.txns[ti];
      var effectiveType=t.type;
      if(t.category==="Pending Review"&&t.suggestedType)effectiveType=t.suggestedType;
      var amtColor=effectiveType==="Income"||effectiveType==="Cash In"?"var(--green)":effectiveType==="Savings"?"var(--purple)":effectiveType==="Non-Transactional"?"var(--dim)":"var(--red)";
      var amtPrefix=effectiveType==="Income"||effectiveType==="Cash In"?"+":effectiveType==="Non-Transactional"?"":"-";
      var displayCat=t.category==="Pending Review"&&t.suggestedCategory?t.suggestedCategory:t.category;
      html+='<div class="row fi" style="animation-delay:'+(.38+shown*0.02)+'s;padding:8px 12px">'+
        '<div class="dot" style="background:'+cc(displayCat)+'"></div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escHtml(t.description)+'</div>'+
          '<div style="font-size:10px;color:var(--dim);margin-top:2px">'+displayCat+'</div>'+
        '</div>'+
        '<div style="font-size:13px;font-weight:700;color:'+amtColor+';flex-shrink:0;margin-left:8px">'+amtPrefix+f(txAmt(t))+'</div>'+
      '</div>';
      shown++;
    }
  }

  if(mt.length>maxShow){
    html+='<div style="text-align:center;padding:10px 0"><span style="font-size:11px;color:var(--purple);cursor:pointer" onclick="cv=\'transactions\';document.querySelectorAll(\'.ni\').forEach(function(e){e.classList.toggle(\'on\',e.dataset.v===\'transactions\')});destroyCharts();render()">View all '+mt.length+' transactions &rarr;</span></div>';
  }

  return html;
}

function bindUpload(){
  var zone=document.getElementById("dropZone");
  var inp=document.getElementById("fileInput");
  if(!zone)return;

  zone.addEventListener("click",function(){inp.click()});
  zone.addEventListener("dragover",function(e){e.preventDefault();zone.classList.add("drag")});
  zone.addEventListener("dragleave",function(){zone.classList.remove("drag")});
  zone.addEventListener("drop",function(e){e.preventDefault();zone.classList.remove("drag");if(e.dataTransfer.files.length)doUpload(e.dataTransfer.files[0])});
  inp.addEventListener("change",function(){if(inp.files.length)doUpload(inp.files[0])});

  var clearBtn=document.getElementById("clearData");
  if(clearBtn)clearBtn.addEventListener("click",function(){
    D=null;selMonth=null;render();toast("Analysis cleared");
  });

  var reviewBanner=document.getElementById("reviewBanner");
  if(reviewBanner)reviewBanner.addEventListener("click",function(){
    if(pendingReview().length>0){
      openReviewWizard();
    }else{
      openUncatWizard();
    }
  });

  var uncatBanner=document.getElementById("uncatBanner");
  if(uncatBanner)uncatBanner.addEventListener("click",function(){
    openUncatWizard();
  });
}

async function doUpload(file){
  var ext=file.name.toLowerCase().split('.').pop();
  if(ext!=="xlsx"&&ext!=="xls"){toast("Please upload an Excel file (.xlsx or .xls)",true);return}
  var fd=new FormData();
  fd.append("file",file);

  var zone=document.getElementById("dropZone");
  zone.innerHTML='<div style="width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px"></div><p>Analyzing your statement...</p><div class="hint">Reading columns, categorizing transactions, generating insights</div>';

  try{
    var r=await fetch("/api/upload",{method:"POST",body:fd});
    var data=await r.json();
    if(!r.ok)throw new Error(data.error||"Upload failed");
    // Store server-suggested categories but mark all as pending user review
    data.transactions.forEach(function(t){
      t.suggestedCategory=t.category;
      t.suggestedType=t.type;
      // Preserve confidence metadata from server
      t.confidence=t.confidence||0;
      t.confidenceLabel=t.confidenceLabel||"low";
      t.reason=t.reason||"";
      t.alternatives=t.alternatives||[];
      // Confirmation status: unreviewed → suggested → confirmed/corrected
      t.reviewStatus="suggested";
      t.category="Pending Review";
      t.type=t.suggestedType==="Non-Transactional"?"Non-Transactional":"Expense";
      t.confirmed=false;
    });
    // Store parseStats for dashboard display
    data.parseStats=data.parseStats||null;
    D=data;
    selMonth=null;
    buildAccounts();
    // Build and show import summary
    var summaryMsg=data.transactions.length+" transactions ready for review";
    if(data.parseStats){
      var ps=data.parseStats;
      summaryMsg=ps.validDates+" of "+data.transactions.length+" transactions with valid dates";
      if(ps.failedDates>0)summaryMsg+=", "+ps.failedDates+" rows had unreadable dates";
    }
    toast(summaryMsg);
    render();
    // Open review wizard for ALL transactions so user can approve suggestions
    setTimeout(function(){openReviewWizard()},500);
  }catch(e){
    toast(e.message,true);
    render();
  }
}

// ───────── BATCH CATEGORIZATION WIZARD ─────────
function normalizeDesc(desc){
  // Normalize transaction descriptions for grouping
  // Remove dates, reference numbers, amounts, trailing numbers
  var s = (desc||"").toLowerCase().trim();
  // Remove common reference patterns like "ref: xxx", "txn xxx", card numbers
  s = s.replace(/\b(ref|txn|transaction|card|payment)\s*[:# -]?\s*\d+\b/gi,"");
  // Remove dates in various formats
  s = s.replace(/\d{1,2}[\/\-\.]\d{1,2}([\/\-\.]\d{2,4})?/g,"");
  // Remove long number sequences (reference numbers, card numbers)
  s = s.replace(/\b\d{4,}\b/g,"");
  // Remove trailing numbers and extra whitespace
  s = s.replace(/\s+\d{1,3}\s*$/,"");
  // Remove currency symbols and amounts at end
  s = s.replace(/[£$€]\s*[\d,.]+/g,"");
  // Collapse whitespace
  s = s.replace(/\s+/g," ").trim();
  // Remove very short leftover (less than 3 chars)
  if(s.length<3) return (desc||"").toLowerCase().trim();
  return s;
}

function groupUncategorized(items){
  var map={};
  items.forEach(function(t){
    var key=normalizeDesc(t.description);
    if(!map[key]){
      map[key]={
        key:key,
        displayName:t.description,
        transactions:[],
        total:0,
        suggestion:null
      };
    }
    map[key].transactions.push(t);
    map[key].total+=txAmt(t);
    // Use the shortest description as display name (usually cleanest)
    if(t.description.length<map[key].displayName.length){
      map[key].displayName=t.description;
    }
  });
  // Add smart suggestions for each group — prefer suggestedCategory from server
  Object.values(map).forEach(function(g){
    // Use server-suggested category if available (from upload)
    var serverSuggestion=null;
    var bestConfidence=0;
    var bestReason="";
    var bestAlternatives=[];
    for(var i=0;i<g.transactions.length;i++){
      if(g.transactions[i].suggestedCategory&&g.transactions[i].suggestedCategory!=="Uncategorized"&&g.transactions[i].suggestedCategory!=="Pending Review"){
        serverSuggestion=g.transactions[i].suggestedCategory;
        bestConfidence=g.transactions[i].confidence||0;
        bestReason=g.transactions[i].reason||"";
        bestAlternatives=g.transactions[i].alternatives||[];
        break;
      }
    }
    g.suggestion=serverSuggestion||smartSuggest(g.displayName,g.transactions);
    g.confidence=bestConfidence;
    g.confidenceLabel=bestConfidence>=0.85?"high":bestConfidence>=0.60?"medium":"low";
    g.reason=bestReason;
    g.alternatives=bestAlternatives;
  });
  // Sort groups by count descending (biggest groups first for efficiency)
  return Object.values(map).sort(function(a,b){return b.transactions.length-a.transactions.length});
}

// Smart suggestion engine: guesses likely category from description patterns
function smartSuggest(desc,txns){
  var lower=(desc||"").toLowerCase();
  // Balance carried forward — should not be categorized as expense/income
  if(/\b(balance carried|balance brought|balance c\/f|balance b\/f|balance c\/d|balance b\/d|opening balance|closing balance|carried forward|brought forward)\b/.test(lower)) return "Balance Carried Forward";
  // Cash transfers between own accounts
  if(/\b(transfer between|inter account|interaccount|internal transfer|own account|between accounts|acc transfer|account transfer|move money|move funds|sweep|self transfer|same name transfer)\b/.test(lower)) return "Cash Transfer";
  // Cash in / deposits
  if(/\b(cash deposit|cash in|cash payment in|counter deposit|counter credit|branch deposit|cash at branch|cash lodgement|lodgement)\b/.test(lower)) return "Cash In";
  // Cash Withdrawal
  if(/\b(atm|cash withdrawal|withdraw|cash send|cardless|cash back at)\b/.test(lower)) return "Cash Withdrawal";
  // Income
  if(/\b(salary|wages?|payroll|pay\s+from|income|commission|bonus|stipend|bursary|grant|payout|pension|benefit|annuity)\b/.test(lower)) return "Income";
  if(/\b(refund|reversal|cashback|reimburse|rebate|credit note|returned|money back)\b/.test(lower)) return "Income";
  if(/\b(sars|hmrc|tax refund|tax return|tax credit|dividend|interest earned|interest received|investment return)\b/.test(lower)) return "Income";
  if(/\b(freelance|invoice paid?|payment received|deposit from|credit received|reward)\b/.test(lower)) return "Income";
  // Bills & Utilities
  if(/\b(rent|landlord|property|estate agent|letting|tenant|lease)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(electric|electricity|gas\s|water|sewage|council|rates|levy|municipal|waste|refuse)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(insurance|insure|cover|policy|premium|assurance|old mutual|sanlam|liberty|discovery|hollard|outsurance|momentum|santam|miway)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(vodafone|mtn|vodacom|cell\s?c|ee\b|o2\b|giffgaff|three\b|telkom|airtel|rain\b|afrihost|fibre|broadband|internet|wifi|dstv|multichoice)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(mortgage|bond repayment|home loan|strata|body corporate|property management|maintenance fee|service charge)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(debit order|d\/o|direct debit|recurring payment|standing order)\b/.test(lower)&&!/\b(gym|fitness|netflix|spotify|amazon|disney)\b/.test(lower)) return "Bills & Utilities";
  // Transport
  if(/\b(uber|bolt|lyft|taxi|cab|ride|didi)\b/.test(lower)&&!/\b(eats|eat|food|delivery)\b/.test(lower)) return "Transport";
  if(/\b(fuel|petrol|diesel|garage|shell|bp\b|caltex|engen|sasol|esso|texaco|total\s+garage|filling station|gas station)\b/.test(lower)) return "Transport";
  if(/\b(parking|park\s|ncp|easy park|justpark)\b/.test(lower)) return "Transport";
  if(/\b(tfl|oyster|bus\b|train|rail|metro|tube|gautrain|rea vaya|myciti|golden arrow)\b/.test(lower)) return "Transport";
  if(/\b(toll|e-?toll|dart charge|congestion|vehicle|mot\s+test|car\s+service|tyre|mechanic|car\s+wash)\b/.test(lower)) return "Transport";
  // Eating Out
  if(/\b(restaurant|cafe|coffee|bistro|diner|eatery|canteen|kitchen)\b/.test(lower)) return "Eating Out";
  if(/\b(takeaway|take\s+away|delivery|uber\s*eats|deliveroo|just\s*eat|mr\s*delivery|door\s*dash|food\s+delivery)\b/.test(lower)) return "Eating Out";
  if(/\b(pizza|burger|chicken|sushi|ramen|kebab|curry|noodle|grill|steakhouse|bbq|bar\b|pub\b|tavern|lounge|cocktail|brewery|beer)\b/.test(lower)) return "Eating Out";
  // Groceries
  if(/\b(grocery|grocer|supermarket|fresh\s+market|butcher|bakery|greengrocer|fruit|veg|organic|deli)\b/.test(lower)) return "Groceries";
  // Shopping
  if(/\b(shop|store|mart|retail|buy|purchase|outlet|boutique|mall|plaza)\b/.test(lower)&&!/\b(coffee|food|eat|restaurant|grocery|body\s+shop)\b/.test(lower)) return "Shopping";
  if(/\b(clothing|fashion|shoes|apparel|accessories|jewel|watch|furniture|decor|hardware|tools|diy|garden|appliance)\b/.test(lower)) return "Shopping";
  if(/\b(online|click|e-?commerce|order|parcel)\b/.test(lower)&&!/\b(food|eat|delivery|uber|just\s*eat)\b/.test(lower)) return "Shopping";
  // Subscriptions
  if(/\b(subscri|member|renewal|recurring|monthly\s+fee|annual\s+fee|premium\s+plan)\b/.test(lower)) return "Subscriptions";
  // Health & Fitness
  if(/\b(gym|fitness|sport|active|exercise|workout|yoga|pilates|crossfit)\b/.test(lower)) return "Health & Fitness";
  if(/\b(pharmacy|chemist|medical|doctor|dr\s|clinic|hospital|dental|dentist|optom|physio|therapist|counsell|psychology|chiropract|pathology)\b/.test(lower)) return "Health & Fitness";
  if(/\b(vitamin|supplement|protein|wellness|medicine|prescription|dispens)\b/.test(lower)) return "Health & Fitness";
  // Entertainment
  if(/\b(cinema|movie|theatre|concert|ticket|event|show|performance|gallery|museum|zoo|aquarium|theme\s+park|arcade|bowling|escape\s+room|comedy|festival)\b/.test(lower)) return "Entertainment";
  if(/\b(gaming|steam|playstation|nintendo|xbox|epic\s+games)\b/.test(lower)) return "Entertainment";
  // Education
  if(/\b(school|university|college|tuition|course|academy|training|workshop|seminar|exam|certification|study|learning|textbook|stationery|education|student|bootcamp)\b/.test(lower)) return "Education";
  if(/\b(udemy|coursera|skillshare|book|kindle|library)\b/.test(lower)) return "Education";
  // Personal Care
  if(/\b(salon|barber|hairdresser|hair|beauty|nail|spa|wax|facial|massage|grooming|cosmetic|makeup|skincare|perfume)\b/.test(lower)) return "Personal Care";
  // Savings
  if(/\b(sav(e|ing)|invest|isa\b|premium\s+bond|unit\s+trust|money\s+market|fixed\s+deposit|etf|index\s+fund|retirement|provident)\b/.test(lower)) return "Savings";
  // Bank Fees
  if(/\b(fee|charge|admin|penalty|interest\s+charge|overdraft|insufficient|nsf|rejected|unpaid|bounce|ledger|service\s+fee|transaction\s+fee|card\s+fee|account\s+fee|monthly\s+fee|sms\s+fee)\b/.test(lower)) return "Bank Fees";
  // Fallback heuristics
  if(/\b(pos|point\s+of\s+sale|card\s+purchase)\b/.test(lower)) return "Shopping";
  if(/\b(pay|pymt|payment|debit\s+order|d\/o)\b/.test(lower)) return "Bills & Utilities";
  if(/\b(transfer|trfr|eft|send|remit)\b/.test(lower)) return "Cash Transfer";
  // Check amount patterns — very small recurring amounts might be subscriptions
  if(txns&&txns.length>=2){
    var amounts=txns.map(function(t){return txAmt(t)});
    var allSame=amounts.every(function(a){return Math.abs(a-amounts[0])<0.1});
    if(allSame&&amounts[0]<100) return "Subscriptions";
  }
  // Fallback: suggest based on amount size and transaction count
  if(txns&&txns.length>0){
    var avgAmt=txns.reduce(function(s,t){return s+txAmt(t)},0)/txns.length;
    if(avgAmt<15) return "Eating Out";
    if(avgAmt<50) return "Shopping";
    if(avgAmt<150) return "Bills & Utilities";
    return "Bills & Utilities";
  }
  return "Shopping";
}

// Helper: determine transaction type from category
function typeForCategory(cat){
  if(cat==="Balance Carried Forward"||cat==="Cash Transfer") return "Non-Transactional";
  if(cat==="Income"||cat==="Cash In") return "Income";
  if(cat==="Savings") return "Savings";
  return "Expense";
}

// ───────── LEARNING API HELPER ─────────
function learnCategories(mappings){
  if(!mappings||!mappings.length)return;
  fetch("/api/learn-categories",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"learn",mappings:mappings})
  }).catch(function(){});
}

var batchState={groups:[],selected:{},expanded:{},search:"",view:"all",isReview:false};

function openUncatWizard(){
  var items=uncategorized();
  if(items.length===0){toast("All transactions are categorized!");return}
  batchState.groups=groupUncategorized(items);
  batchState.selected={};
  batchState.expanded={};
  batchState.search="";
  batchState.view="all";
  showBatchModal();
}

// Review wizard for ALL pending transactions after upload
function pendingReview(){
  if(!D||!D.transactions)return[];
  return D.transactions.filter(function(t){return t.confirmed===false||t.category==="Pending Review"});
}

function openReviewWizard(){
  var items=pendingReview();
  if(items.length===0){
    // Fall back to uncategorized wizard
    openUncatWizard();
    return;
  }
  batchState.groups=groupUncategorized(items);
  batchState.selected={};
  batchState.expanded={};
  batchState.search="";
  batchState.view="all";
  batchState.isReview=true;
  showBatchModal();
}

function getFilteredGroups(){
  var groups=batchState.groups;
  var search=batchState.search.toLowerCase();
  if(search){
    groups=groups.filter(function(g){
      return g.displayName.toLowerCase().includes(search)||g.key.includes(search);
    });
  }
  if(batchState.view==="multi"){
    groups=groups.filter(function(g){return g.transactions.length>1});
  }else if(batchState.view==="single"){
    groups=groups.filter(function(g){return g.transactions.length===1});
  }else if(batchState.view==="suggested"){
    groups=groups.filter(function(g){return g.suggestion!=null});
  }
  return groups;
}

  var existing=document.querySelector(".modal-bg");
  if(existing)existing.remove();

  var isReviewMode=batchState.isReview;
  var items=isReviewMode?pendingReview():uncategorized();

        '</div>'+

        '<div class="batch-tab'+(batchState.view==="suggested"?" on":"")+'" data-bv="suggested">Suggested ('+suggestedGroups.length+')</div>'+
        '<div class="batch-tab'+(batchState.view==="multi"?" on":"")+'" data-bv="multi">Multi ('+multiGroups.length+')</div>'+
        '<div class="batch-tab'+(batchState.view==="single"?" on":"")+'" data-bv="single">Single ('+(totalGroups-multiGroups.length)+')</div>'+
      '</div>'+
      (suggestedGroups.length>0?
        '<div class="suggest-banner" id="acceptAllSuggestions" style="background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);border-radius:12px;padding:12px 16px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .2s">'+
          '<div><div style="font-size:13px;font-weight:700;color:var(--purple)">'+(isReviewMode?'Accept All Suggested Categories':'Accept All Suggestions')+'</div>'+
          '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+(isReviewMode?'Approve all '+suggestedTxnCount+' suggested categories at once':'Auto-categorize '+suggestedTxnCount+' transactions in '+suggestedGroups.length+' groups with one tap')+'</div></div>'+
          '<div style="background:var(--purple);color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap">'+(isReviewMode?'Approve All':'Accept All')+'</div>'+

              (isExpanded?'<div class="group-txns">'+g.transactions.map(function(t){
                return '<div class="group-txn"><span class="txn-desc">'+escHtml(t.description)+'</span><span>'+t.date+'</span><span style="margin-left:8px;font-weight:600">-'+f(txAmt(t))+'</span></div>';
              }).join("")+'</div>':'')+

          }).join("")
        )+

        '<div class="batch-apply-bar">'+
          '<select class="batch-cat-select" id="batchCatSelect">'+
            '<option value="">Choose category...</option>'+
            CATS.filter(function(c){return c!=="Uncategorized"}).map(function(c){
              return '<option value="'+c+'">'+c+'</option>';
            }).join("")+
          '</select>'+
          '<button class="batch-apply-btn" id="batchApply" '+(selectedCount===0?"disabled":"")+'>Apply to '+selectedTxnCount+'</button>'+

}

function escHtml(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function bindBatchEvents(bg){
  // Search
  var searchInput=document.getElementById("batchSearch");
  var searchTimer;
  searchInput.addEventListener("input",function(){
    clearTimeout(searchTimer);
    searchTimer=setTimeout(function(){
      batchState.search=searchInput.value;
      showBatchModal();
    },250);
  });

  // Tabs
  bg.querySelectorAll(".batch-tab").forEach(function(tab){
    tab.addEventListener("click",function(){
      batchState.view=tab.dataset.bv;
      showBatchModal();
    });
  });

  // Accept All Suggestions button
  var acceptAllBtn=document.getElementById("acceptAllSuggestions");
  if(acceptAllBtn){
    acceptAllBtn.addEventListener("click",function(){
      var applied=0;
      var toLearn=[];
      batchState.groups.forEach(function(g){
        if(g.suggestion){
          g.transactions.forEach(function(t){
            t.reviewStatus=t.suggestedCategory===g.suggestion?"confirmed":"corrected";
            t.category=g.suggestion;
            t.type=typeForCategory(g.suggestion);
            t.confirmed=true;
            toLearn.push({description:t.description,category:g.suggestion});
          });
          applied+=g.transactions.length;
        }
      });
      learnCategories(toLearn);
      toast(applied+" transactions approved!");
      showBatchModal();
    });
  }

  // Select all
  var selectAllRow=document.getElementById("selectAll");
  if(selectAllRow){
    selectAllRow.addEventListener("click",function(){
      var groups=getFilteredGroups();
      var allSelected=groups.every(function(g){return batchState.selected[g.key]});
      groups.forEach(function(g){batchState.selected[g.key]=!allSelected});
      showBatchModal();
    });
  }

  // Group cards
  bg.querySelectorAll(".group-card").forEach(function(card){
    var key=card.dataset.gkey;
    card.querySelector('[data-action="toggle"]').addEventListener("click",function(){
      batchState.selected[key]=!batchState.selected[key];
      showBatchModal();
    });
    var expandBtn=card.querySelector('[data-action="expand"]');
    if(expandBtn){
      expandBtn.addEventListener("click",function(e){
        e.stopPropagation();
        batchState.expanded[key]=!batchState.expanded[key];
        showBatchModal();
      });
    }
    // All quick-accept buttons (primary suggestion + alternatives)
    card.querySelectorAll('[data-action="quickAccept"]').forEach(function(quickAcceptBtn){
      quickAcceptBtn.addEventListener("click",function(e){
        e.stopPropagation();
        var cat=quickAcceptBtn.dataset.cat;
        var group=batchState.groups.find(function(g){return g.key===key});
        if(group){
          var toLearn=[];
          group.transactions.forEach(function(t){
            t.reviewStatus=t.suggestedCategory===cat?"confirmed":"corrected";
            t.category=cat;
            t.type=typeForCategory(cat);
            t.confirmed=true;
            toLearn.push({description:t.description,category:cat});
          });
          learnCategories(toLearn);
          toast(group.transactions.length+" categorized as "+cat);
          showBatchModal();
        }
      });
    });
  });

  // Apply button
  document.getElementById("batchApply").addEventListener("click",function(){
    var catSelect=document.getElementById("batchCatSelect");
    var cat=catSelect.value;
    if(!cat){toast("Please select a category first",true);return}
    var applied=0;
    var toLearn=[];
    batchState.groups.forEach(function(g){
      if(batchState.selected[g.key]){
        g.transactions.forEach(function(t){
          t.reviewStatus=t.suggestedCategory===cat?"confirmed":"corrected";
          t.category=cat;
          t.type=typeForCategory(cat);
          t.confirmed=true;
          toLearn.push({description:t.description,category:cat});
        });
        applied+=g.transactions.length;
      }
    });
    learnCategories(toLearn);
    // Clear selection for applied groups
    Object.keys(batchState.selected).forEach(function(k){
      if(batchState.selected[k])delete batchState.selected[k];
    });
    batchState.expanded={};
    toast(applied+" transactions categorized as "+cat);
    // Refresh — will recompute groups from remaining uncategorized
    showBatchModal();
  });

  // Done
  document.getElementById("batchDone").addEventListener("click",function(){
    bg.remove();
    // Mark any remaining "Pending Review" transactions with their suggested category
    if(D&&D.transactions){
      D.transactions.forEach(function(t){
        if(t.category==="Pending Review"&&t.suggestedCategory){
          t.category=t.suggestedCategory;
          t.type=t.suggestedType||typeForCategory(t.suggestedCategory);
          t.reviewStatus="confirmed";
          t.confirmed=true;
        }
      });
    }
    batchState.isReview=false;
    recalcAnalysis();
    render();
    // Persist transactions to blobs and sync to hub
    saveTransactionsToBlobs();
    syncTransactionsToHub();
    toast("Analysis updated & saved");
  });
}

function recalcAnalysis(){
  if(!D||!D.transactions)return;
  buildAccounts();
  var txns=D.transactions.filter(function(t){return !t.account||t.account.toLowerCase().indexOf("remittance")===-1});
  var totalIncome=0,totalExpenses=0,totalSavings=0;
  txns.forEach(function(t){
    // Use suggested type/category for analysis if still pending review
    var effectiveType=t.type;
    if(t.category==="Pending Review"&&t.suggestedType){
      effectiveType=t.suggestedType;
    }
    if(effectiveType==="Non-Transactional") return;
    if(effectiveType==="Income")totalIncome+=txAmt(t);
    else if(effectiveType==="Savings")totalSavings+=txAmt(t);
    else totalExpenses+=txAmt(t);
  });
  D.analysis.totalIncome=Math.round(totalIncome*100)/100;
  D.analysis.totalExpenses=Math.round(totalExpenses*100)/100;
  D.analysis.totalSavings=Math.round(totalSavings*100)/100;
  D.analysis.net=Math.round((totalIncome-totalExpenses-totalSavings)*100)/100;

  // Recalc category breakdown — use effective category
  var catMap={};
  txns.forEach(function(t){
    var effectiveType=t.type;
    var effectiveCat=t.category;
    if(t.category==="Pending Review"&&t.suggestedCategory){
      effectiveCat=t.suggestedCategory;
      effectiveType=t.suggestedType||typeForCategory(t.suggestedCategory);
    }
    if(effectiveType!=="Expense")return;
    if(!catMap[effectiveCat])catMap[effectiveCat]={total:0,count:0};
    catMap[effectiveCat].total+=txAmt(t);
    catMap[effectiveCat].count++;
  });
  D.analysis.categoryBreakdown=Object.entries(catMap).map(function(e){
    return{name:e[0],total:Math.round(e[1].total*100)/100,count:e[1].count,percentage:totalExpenses>0?Math.round(e[1].total/totalExpenses*1000)/10:0};
  }).sort(function(a,b){return b.total-a.total});
}

function bindTxnEvents(){

function healthScore(income,expenses,savings){
  if(income===0)return 30;
  var spendRatio=expenses/income;
  var saveRatio=savings/income;
  var score=100;
  if(spendRatio>1)score-=40;
  else if(spendRatio>0.9)score-=30;
  else if(spendRatio>0.8)score-=15;
  else if(spendRatio>0.7)score-=5;
  if(saveRatio<0.05)score-=15;
  else if(saveRatio<0.1)score-=10;
  else if(saveRatio>0.2)score+=5;
  return Math.max(10,Math.min(100,Math.round(score)));
}

function healthColor(i,e,s){
  var sc=healthScore(i,e,s);
  if(sc>=75)return"var(--green)";
  if(sc>=50)return"var(--amber)";
  return"var(--red)";
}

function healthLabel(i,e,s){
  var sc=healthScore(i,e,s);
  if(sc>=80)return"Excellent";
  if(sc>=65)return"Good";
  if(sc>=50)return"Needs Attention";
  if(sc>=35)return"Concerning";
  return"Critical";
}

function parseDateFlex(s){
  if(!s)return null;
  // Try DD/MM/YYYY first
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
  // Try YYYY-MM-DD
  var m2=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m2)return new Date(parseInt(m2[1]),parseInt(m2[2])-1,parseInt(m2[3]));
  // Fallback
  var d=new Date(s);
  return isNaN(d.getTime())?null:d;
}

function dateToISO(s){
  var d=parseDateFlex(s);
  return d?d.toISOString().slice(0,10):"";
}

function estimateNextDate(lastDate,frequency){
  if(!lastDate)return"";
  var d=parseDateFlex(lastDate);
  if(!d)return"";
  var freq=(frequency||"monthly").toLowerCase();
  if(freq==="monthly")d.setMonth(d.getMonth()+1);
  else if(freq==="weekly")d.setDate(d.getDate()+7);
  else if(freq==="bi-weekly")d.setDate(d.getDate()+14);
  else if(freq==="quarterly")d.setMonth(d.getMonth()+3);
  else if(freq==="yearly")d.setFullYear(d.getFullYear()+1);
  else d.setMonth(d.getMonth()+1);
  return d.toISOString().slice(0,10);
}
